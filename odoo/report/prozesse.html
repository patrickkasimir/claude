<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Odoo – Prozess-Dokumentation</title>
  <style>
    :root {
      --bg: #f4f3f7; --surface: #ffffff; --surface2: #faf9fc; --text: #2b2733;
      --muted: #8b8794; --accent: #714B67; --accent2: #9b6a8c; --accent-soft: #f0e9ef;
      --border: #e7e3ec; --ok: #2f8f63; --warn: #c98a2b; --info: #3b6ea5;
      --shadow: 0 1px 3px #2b273310, 0 8px 24px #2b273308;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; line-height: 1.5; font-size: 15px; }

    header.top { background: linear-gradient(120deg, var(--accent), var(--accent2)); color: #fff; padding: 30px 28px; }
    header.top .wrap { max-width: 1140px; margin: 0 auto; }
    header.top h1 { font-size: 1.6rem; font-weight: 600; }
    header.top .sub { margin-top: 8px; opacity: 0.92; font-size: 0.92rem; display: flex; flex-wrap: wrap; gap: 6px 20px; }
    header.top .nav { margin-top: 14px; display: flex; gap: 10px; }
    header.top .nav a { color: #fff; text-decoration: none; font-size: 0.82rem; background: #ffffff22; border: 1px solid #ffffff55; padding: 4px 12px; border-radius: 999px; }
    header.top .nav a.cur { background: #fff; color: var(--accent); }

    .layout { max-width: 1140px; margin: 0 auto; padding: 28px; display: grid; grid-template-columns: 210px 1fr; gap: 32px; align-items: start; }
    nav.side { position: sticky; top: 20px; display: flex; flex-direction: column; gap: 2px; }
    nav.side a { text-decoration: none; color: var(--muted); padding: 8px 12px; border-radius: 8px; font-size: 0.9rem; border-left: 3px solid transparent; }
    nav.side a:hover { background: var(--accent-soft); color: var(--accent); }
    nav.side a.active { background: var(--accent-soft); color: var(--accent); border-left-color: var(--accent); font-weight: 600; }
    nav.side .grp { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 1px; color: #b7b2bf; padding: 12px 12px 4px; }

    main { min-width: 0; }
    section { margin-bottom: 40px; scroll-margin-top: 20px; }
    section > h2 { font-size: 1.2rem; font-weight: 600; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 2px solid var(--accent-soft); }
    .sub-h { font-size: 0.74rem; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin: 16px 0 8px; }

    .block { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; box-shadow: var(--shadow); margin-bottom: 12px; }
    .block h3 { font-size: 0.92rem; font-weight: 600; margin-bottom: 2px; }
    .block .meta { font-family: ui-monospace, monospace; font-size: 0.72rem; color: var(--muted); margin-bottom: 10px; }

    .flow { display: flex; flex-wrap: wrap; align-items: center; gap: 6px; }
    .chip { background: var(--accent-soft); color: var(--accent); border: 1px solid #d9c9d4; border-radius: 8px; padding: 5px 11px; font-size: 0.84rem; font-weight: 500; white-space: nowrap; }
    .chip.won { background: #e6f4ec; color: var(--ok); border-color: #bfe2cd; }
    .chip.fold { background: var(--surface2); color: var(--muted); border-color: var(--border); }
    .chip .k { font-family: ui-monospace, monospace; font-size: 0.7rem; opacity: 0.7; margin-right: 5px; }
    .arrow { color: var(--muted); font-size: 0.9rem; }

    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    th { text-align: left; color: var(--muted); font-weight: normal; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.5px; padding: 6px 8px; border-bottom: 1px solid var(--border); }
    td { padding: 7px 8px; border-bottom: 1px solid #00000008; vertical-align: top; }
    td.mono { font-family: ui-monospace, monospace; font-size: 0.76rem; color: var(--accent); }
    .pill { font-size: 0.66rem; padding: 2px 8px; border-radius: 999px; white-space: nowrap; }
    .pill.on { background: #e6f4ec; color: var(--ok); }
    .pill.off { background: #fbeaea; color: #b14; }
    .pill.cust { background: #fff3e0; color: var(--warn); }
    .tag { display: inline-block; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 3px 9px; font-size: 0.78rem; margin: 0 4px 6px 0; }

    .finding { display: flex; gap: 10px; padding: 11px 14px; border-radius: 10px; margin-bottom: 8px; font-size: 0.88rem; border: 1px solid var(--border); background: var(--surface); }
    .finding .lvl { font-size: 0.64rem; text-transform: uppercase; letter-spacing: 0.5px; padding: 2px 8px; border-radius: 999px; height: fit-content; white-space: nowrap; }
    .finding.warn .lvl { background: #fbf0dc; color: var(--warn); }
    .finding.info .lvl { background: #e7f0fa; color: var(--info); }
    .finding .txt b { color: var(--text); }

    footer { max-width: 1140px; margin: 0 auto; padding: 16px 28px 50px; color: var(--muted); font-size: 0.8rem; }
    .muted { color: var(--muted); }
    @media (max-width: 760px) { .layout { grid-template-columns: 1fr; } nav.side { flex-direction: row; flex-wrap: wrap; } }
  </style>
</head>
<body>

<header class="top">
  <div class="wrap">
    <h1>Prozess-Dokumentation</h1>
    <div class="sub" id="head-sub"></div>
    <div class="nav">
      <a href="index.html">Überblick</a>
      <a href="technik.html">Technik</a>
      <a href="prozesse.html" class="cur">Prozesse</a>
      <a href="sicherheit.html">Sicherheit</a>
      <a href="advisor.html">Advisor</a>
    </div>
  </div>
</header>

<div class="layout">
  <nav class="side" id="side-nav"></nav>
  <main id="main"></main>
</div>

<footer id="footer"></footer>

<script src="processes.js"></script>
<script>
  const P = window.ODOO_PROCESSES;
  const esc = s => (s == null ? '' : String(s)).replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c]));
  const slug = s => s.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');

  const AREA_ORDER = ['Vertrieb', 'CRM', 'Buchhaltung', 'Projekt', 'Personal', 'Lager', 'Fertigung', 'Kommunikation', 'Website', 'Events', 'Kasse', 'Sonstiges'];

  if (!P) {
    document.getElementById('main').innerHTML =
      '<div class="block">Keine Prozessdaten gefunden – bitte <code>python3 odoo/extract_processes.py</code> ausführen.</div>';
  } else {
    render();
  }

  function flow(items) {
    return '<div class="flow">' + items.map((it, i) =>
      (i ? '<span class="arrow">→</span>' : '') +
      `<span class="chip ${it.cls || ''}">${it.k ? `<span class="k">${esc(it.k)}</span>` : ''}${esc(it.label)}</span>`
    ).join('') + '</div>';
  }

  function configFor(area) {
    const c = P.config || {}, out = [];
    if (area === 'Buchhaltung') {
      if (c.journals) {
        const byType = {};
        c.journals.forEach(j => (byType[j.type] = byType[j.type] || []).push(j.name));
        out.push(`<div class="block"><h3>Journale</h3><div class="meta">account.journal · ${c.journals.length}</div>` +
          Object.entries(byType).map(([t, ns]) => `<div style="margin-bottom:5px"><span class="mono" style="color:var(--accent)">${esc(t)}</span>: ${ns.map(esc).join(', ')}</div>`).join('') + `</div>`);
      }
      if (c.payment_terms) out.push(tagBlock('Zahlungsbedingungen', 'account.payment.term', c.payment_terms));
      if (c.fiscal_positions) out.push(tagBlock('Steuerpositionen', 'account.fiscal.position', c.fiscal_positions));
      if (c.taxes_count != null) out.push(`<div class="block"><h3>Steuern</h3><span class="tag">${c.taxes_count} Steuersätze</span></div>`);
    }
    if (area === 'CRM' && c.crm_teams) out.push(tagBlock('Verkaufsteams', 'crm.team', c.crm_teams));
    if (area === 'Vertrieb' && c.sale_templates) out.push(tagBlock('Angebotsvorlagen', 'sale.order.template', c.sale_templates));
    return out.join('');
  }
  function tagBlock(title, model, arr) {
    return `<div class="block"><h3>${esc(title)}</h3><div class="meta">${esc(model)} · ${arr.length}</div>${arr.map(x => `<span class="tag">${esc(x)}</span>`).join('')}</div>`;
  }

  function areaContent(area) {
    let html = '';
    const pls = (P.pipelines || []).filter(p => p.area === area);
    const sts = (P.doc_states || []).filter(d => d.area === area);
    const aut = (P.automations || []).filter(a => a.area === area);
    const mls = (P.mail_templates || []).filter(m => m.area === area);
    const cfg = configFor(area);

    if (pls.length || sts.length) {
      html += '<div class="sub-h">Ablauf &amp; Stadien</div>';
      pls.forEach(p => {
        html += `<div class="block"><h3>${esc(p.label)}</h3><div class="meta">${esc(p.model)} · ${p.stages.length} Stadien</div>` +
          flow(p.stages.map(s => ({ label: s.name, cls: s.is_won ? 'won' : (s.fold ? 'fold' : '') }))) + `</div>`;
      });
      sts.forEach(d => {
        html += `<div class="block"><h3>${esc(d.label)}</h3><div class="meta">${esc(d.model)} · Status</div>` +
          flow(d.states.map(([k, v]) => ({ k, label: v }))) + `</div>`;
      });
    }
    if (aut.length) {
      html += '<div class="sub-h">Automatisierungen</div><div class="block"><table><thead><tr><th>Regel</th><th>Auslöser</th><th>Status</th></tr></thead><tbody>' +
        aut.map(x => `<tr><td>${esc(x.name)} ${x.model && x.model.startsWith('x_') ? '<span class="pill cust">custom</span>' : ''}<div class="meta" style="margin:2px 0 0">${esc(x.model || x.model_label)}</div></td><td>${esc(x.trigger)}</td><td>${x.active ? '<span class="pill on">aktiv</span>' : '<span class="pill off">inaktiv</span>'}</td></tr>`).join('') +
        '</tbody></table></div>';
    }
    if (mls.length) {
      html += '<div class="sub-h">Automatische E-Mails</div><div class="block"><table><thead><tr><th>Objekt</th><th>Anzahl</th><th>Beispiele</th></tr></thead><tbody>' +
        mls.map(x => `<tr><td class="mono">${esc(x.model)}</td><td>${x.count}</td><td class="muted">${x.examples.slice(0, 4).map(esc).join(', ')}</td></tr>`).join('') +
        '</tbody></table></div>';
    }
    if (cfg) { html += '<div class="sub-h">Konfiguration</div>' + cfg; }
    return html;
  }

  function render() {
    const s = P.server, dt = new Date(P.generated_at);
    document.getElementById('head-sub').innerHTML =
      `<span>DB: ${esc(s.db)}</span><span>Version: ${esc(s.version)}</span><span>Erzeugt: ${dt.toLocaleString('de-DE')}</span>`;
    document.getElementById('footer').textContent = 'Automatisch erzeugt aus der Odoo-Instanz · ' + dt.toLocaleString('de-DE');

    const main = document.getElementById('main');
    const navItems = [];
    let body = '';

    AREA_ORDER.forEach(area => {
      const content = areaContent(area);
      if (!content) return;
      const id = 'area-' + slug(area);
      const label = area === 'Sonstiges' ? 'Sonstiges / Übergreifend' : area;
      body += `<section id="${id}"><h2>${esc(label)}</h2>${content}</section>`;
      navItems.push({ id, label });
    });

    if ((P.crons || []).length) {
      body += `<section id="cron"><h2>Hintergrundjobs (Cron)</h2><div class="block"><table><thead><tr><th>Job</th><th>Intervall</th><th>Status</th></tr></thead><tbody>` +
        P.crons.map(x => `<tr><td>${esc(x.name)}</td><td class="mono">${esc((x.interval_number ?? '') + ' ' + (x.interval_type || ''))}</td><td>${x.active ? '<span class="pill on">aktiv</span>' : '<span class="pill off">inaktiv</span>'}</td></tr>`).join('') +
        `</tbody></table></div></section>`;
      navItems.push({ id: 'cron', label: 'Hintergrundjobs' });
    }

    body += `<section id="hinweise"><h2>Hinweise &amp; Fallstricke</h2>${findings()}</section>`;
    navItems.push({ id: 'hinweise', label: 'Hinweise & Fallstricke' });

    main.innerHTML = body;
    document.getElementById('side-nav').innerHTML =
      '<div class="grp">Geschäftsbereiche</div>' +
      navItems.map(n => `<a href="#${n.id}">${esc(n.label)}</a>`).join('');
    setupNav();
  }

  function findings() {
    const F = [];
    const add = (lvl, txt) => F.push({ lvl, txt });

    (P.pipelines || []).forEach(p => {
      const names = p.stages.map(s => (s.name || '').toLowerCase());
      const dups = [...new Set(names.filter((n, i) => names.indexOf(n) !== i))];
      if (dups.length) add('warn', `<b>${esc(p.label)}</b> (${esc(p.model)}): doppelte Stadien-Namen – ${esc(dups.join(', '))}. Meist vermischte Stadien mehrerer Teams/Projekte; erschwert konsistente Auswertung.`);
      if (p.stages.length > 12) add('warn', `<b>${esc(p.label)}</b>: ${p.stages.length} Stadien – sehr viele; prüfen, ob team-/projektspezifisch getrennt werden sollte.`);
      if (p.model === 'crm.stage' && !p.stages.some(s => s.is_won)) add('warn', `<b>${esc(p.label)}</b>: keine „Gewonnen"-Phase markiert – verfälscht Gewinn-/Conversion-Auswertungen.`);
      if (p.stages.length > 2 && !p.stages.some(s => s.fold)) add('info', `<b>${esc(p.label)}</b>: keine eingeklappte Abschluss-Spalte (fold) – das Kanban wird schnell unübersichtlich.`);
    });

    const custom = [...new Set((P.automations || []).filter(a => a.model && a.model.startsWith('x_')).map(a => a.model))];
    if (custom.length) add('info', `Eigenentwickelte Prozesse auf Custom-Modellen: <b>${esc(custom.join(', '))}</b>. Bei Migration auf eine frische Instanz gesondert mitnehmen.`);

    const inaA = (P.automations || []).filter(a => !a.active);
    if (inaA.length) add('warn', `${inaA.length} Automatisierungsregel(n) <b>inaktiv</b> – evtl. Altlast oder versehentlich deaktiviert.`);
    const inaC = (P.crons || []).filter(c => !c.active);
    if (inaC.length) add('warn', `${inaC.length} Cron-Job(s) <b>inaktiv</b>.`);

    const c = P.config || {};
    if (c.journals) { const l = c.journals.map(j => (j.name || '').toLowerCase()); if (l.length !== new Set(l).size) add('info', `Journale mit gleichen Namen – typisch für <b>Multi-Company</b> (je Firma eigene Journale).`); }
    if (c.fiscal_positions) { const l = c.fiscal_positions.map(x => x.toLowerCase()); if (l.length !== new Set(l).size) add('info', `Steuerpositionen mehrfach – ebenfalls <b>Multi-Company</b>-bedingt.`); }

    const totalMails = (P.mail_templates || []).reduce((s, m) => s + m.count, 0);
    if (totalMails > 40) add('info', `${totalMails} aktive Mail-Vorlagen – viel automatischer Mailverkehr; bei Bedarf ausmisten.`);
    if (c.payment_terms && c.payment_terms.length > 8) add('info', `${c.payment_terms.length} Zahlungsbedingungen – prüfen, ob alle wirklich genutzt werden.`);

    if (!F.length) add('info', 'Keine Auffälligkeiten in dieser Regel-Schicht gefunden.');
    return F.map(x => `<div class="finding ${x.lvl}"><span class="lvl">${x.lvl === 'warn' ? 'Hinweis' : 'Info'}</span><span class="txt">${x.txt}</span></div>`).join('');
  }

  function setupNav() {
    const links = [...document.querySelectorAll('nav.side a')];
    const map = {};
    links.forEach(l => { map[l.getAttribute('href').slice(1)] = l; });
    const obs = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          links.forEach(l => l.classList.remove('active'));
          if (map[e.target.id]) map[e.target.id].classList.add('active');
        }
      });
    }, { rootMargin: '-15% 0px -75% 0px' });
    document.querySelectorAll('main section').forEach(s => obs.observe(s));
  }
</script>
</body>
</html>
