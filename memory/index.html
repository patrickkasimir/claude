<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Memory</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a1a2e;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px 20px;
    }

    nav {
      align-self: flex-start;
      margin-bottom: 20px;
    }

    nav a {
      color: #4ade80;
      text-decoration: none;
      font-size: 0.9rem;
      letter-spacing: 1px;
      opacity: 0.7;
      transition: opacity 0.2s;
    }

    nav a:hover { opacity: 1; }

    h1 {
      font-size: 2.5rem;
      letter-spacing: 4px;
      color: #4ade80;
      text-shadow: 0 0 20px #4ade8088;
      margin-bottom: 16px;
    }

    #scoreboard {
      display: flex;
      gap: 40px;
      margin-bottom: 20px;
      font-size: 0.95rem;
      color: #aaa;
    }

    #scoreboard span { color: #4ade80; font-weight: bold; font-size: 1.1rem; }

    #difficulty {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
    }

    #difficulty button {
      background: #16213e;
      border: 1px solid #4ade8044;
      color: #aaa;
      padding: 6px 18px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.2s;
    }

    #difficulty button.active {
      background: #4ade80;
      color: #1a1a2e;
      font-weight: bold;
      border-color: #4ade80;
    }

    #board {
      display: grid;
      gap: 10px;
      margin-bottom: 30px;
    }

    .card-wrap {
      perspective: 600px;
      cursor: pointer;
    }

    .card-inner {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.4s ease;
    }

    .card-wrap.flipped .card-inner  { transform: rotateY(180deg); }
    .card-wrap.matched .card-inner  { transform: rotateY(180deg); }

    .card-front, .card-back {
      position: absolute;
      inset: 0;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }

    .card-front {
      background: #16213e;
      border: 1px solid #4ade8033;
      font-size: 1.5rem;
      color: #4ade8044;
    }

    .card-back {
      background: #0f3460;
      border: 1px solid #4ade8066;
      transform: rotateY(180deg);
    }

    .card-back span { font-size: 2rem; }

    .card-wrap.matched .card-back {
      background: #14532d;
      border-color: #4ade80;
      box-shadow: 0 0 12px #4ade8044;
    }

    #overlay {
      position: fixed;
      inset: 0;
      background: #1a1a2ecc;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    #overlay h2 { font-size: 2rem; color: #4ade80; margin-bottom: 8px; }
    #overlay p  { color: #aaa; margin-bottom: 24px; }

    #overlay button, #restart-btn {
      background: #4ade80;
      color: #1a1a2e;
      border: none;
      padding: 12px 32px;
      font-size: 1rem;
      font-weight: bold;
      border-radius: 6px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.2s;
    }

    #overlay button:hover, #restart-btn:hover { background: #22c55e; }
  </style>
</head>
<body>

<script src="/claudeapps/shared/back-button.js"></script>

<h1>MEMORY</h1>

<div id="scoreboard">
  Züge: <span id="moves">0</span>
  &nbsp;&nbsp;Paare: <span id="pairs">0</span> / <span id="total">0</span>
  &nbsp;&nbsp;Zeit: <span id="timer">0:00</span>
</div>

<div id="difficulty">
  <button data-grid="4" class="active">4×4 (leicht)</button>
  <button data-grid="6">6×6 (mittel)</button>
  <button data-grid="8">8×8 (schwer)</button>
</div>

<div id="board"></div>

<div id="overlay">
  <h2>🧠 MEMORY</h2>
  <p>Finde alle Kartenpaare</p>
  <button id="start-btn">SPIELEN</button>
</div>

<script>
  const EMOJIS = [
    '🐶','🐱','🐭','🐹','🐰','🦊','🐻','🐼','🐨','🐯',
    '🦁','🐮','🐸','🐵','🐔','🐧','🐦','🦆','🦅','🦉',
    '🦇','🐺','🐗','🐴','🦄','🐝','🐛','🦋','🐌','🐞',
    '🌸','🌺','🌻','🌹','🍀','🌴','🌵','🍄','🌊','⭐'
  ];

  const board    = document.getElementById('board');
  const overlay  = document.getElementById('overlay');
  const movesEl  = document.getElementById('moves');
  const pairsEl  = document.getElementById('pairs');
  const totalEl  = document.getElementById('total');
  const timerEl  = document.getElementById('timer');

  let gridSize = 4, cards = [], flipped = [], matched = 0, moves = 0;
  let lockBoard = false, timerInterval, seconds = 0, started = false;

  document.querySelectorAll('#difficulty button').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#difficulty button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      gridSize = parseInt(btn.dataset.grid);
      startGame();
    });
  });

  document.getElementById('start-btn').addEventListener('click', startGame);

  function startGame() {
    overlay.style.display = 'none';
    clearInterval(timerInterval);
    seconds = 0; moves = 0; matched = 0; flipped = []; lockBoard = false; started = false;
    movesEl.textContent = '0';
    pairsEl.textContent = '0';
    timerEl.textContent = '0:00';

    const total = (gridSize * gridSize) / 2;
    totalEl.textContent = total;

    const pool = EMOJIS.slice(0, total);
    const deck = shuffle([...pool, ...pool]);

    const cardSize = gridSize === 4 ? 80 : gridSize === 6 ? 70 : 55;
    const gap = 10;
    board.style.gridTemplateColumns = `repeat(${gridSize}, ${cardSize}px)`;
    board.style.gridTemplateRows    = `repeat(${gridSize}, ${cardSize}px)`;
    board.innerHTML = '';
    cards = [];

    deck.forEach((emoji, i) => {
      const wrap = document.createElement('div');
      wrap.className = 'card-wrap';
      wrap.style.width  = cardSize + 'px';
      wrap.style.height = cardSize + 'px';
      wrap.dataset.emoji = emoji;

      wrap.innerHTML = `
        <div class="card-inner">
          <div class="card-front">?</div>
          <div class="card-back"><span>${emoji}</span></div>
        </div>`;

      wrap.addEventListener('click', () => flipCard(wrap));
      board.appendChild(wrap);
      cards.push(wrap);
    });
  }

  function flipCard(card) {
    if (lockBoard || card.classList.contains('flipped') || card.classList.contains('matched')) return;

    if (!started) {
      started = true;
      timerInterval = setInterval(() => {
        seconds++;
        const m = Math.floor(seconds/60), s = seconds%60;
        timerEl.textContent = `${m}:${s.toString().padStart(2,'0')}`;
      }, 1000);
    }

    card.classList.add('flipped');
    flipped.push(card);

    if (flipped.length === 2) {
      moves++;
      movesEl.textContent = moves;
      lockBoard = true;

      if (flipped[0].dataset.emoji === flipped[1].dataset.emoji) {
        flipped.forEach(c => c.classList.add('matched'));
        matched++;
        pairsEl.textContent = matched;
        flipped = [];
        lockBoard = false;

        if (matched === (gridSize * gridSize) / 2) {
          clearInterval(timerInterval);
          setTimeout(showWin, 500);
        }
      } else {
        setTimeout(() => {
          flipped.forEach(c => c.classList.remove('flipped'));
          flipped = [];
          lockBoard = false;
        }, 900);
      }
    }
  }

  function showWin() {
    const m = Math.floor(seconds/60), s = seconds%60;
    overlay.innerHTML = `
      <h2>🎉 Gewonnen!</h2>
      <p>Züge: ${moves} &nbsp;|&nbsp; Zeit: ${m}:${s.toString().padStart(2,'0')}</p>
      <button id="restart-btn">NOCHMAL</button>
    `;
    overlay.style.display = 'flex';
    document.getElementById('restart-btn').addEventListener('click', startGame);
  }

  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i+1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }
</script>
</body>
</html>
