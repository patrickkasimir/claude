<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Share Handling — Aktienregister</title>
<style>
  :root {
    --bg: #1a1a2e;
    --surface: #16213e;
    --surface2: #0f3460;
    --accent: #4ade80;
    --accent-dim: #4ade8022;
    --border: #4ade8022;
    --text: #eee;
    --muted: #888;
    --danger: #f87171;
    --warn: #fbbf24;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    font-size: 14px;
    display: flex;
    overflow: hidden;
  }

  /* ── Sidebar ── */
  #sidebar {
    width: 264px;
    flex-shrink: 0;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    height: 100vh;
  }
  #sidebar-header {
    padding: 64px 20px 16px;
    border-bottom: 1px solid var(--border);
  }
  #sidebar-header h1 {
    font-size: 1.05rem;
    letter-spacing: 2px;
    color: var(--accent);
    font-weight: 700;
  }
  #sidebar-header p { color: var(--muted); font-size: 0.72rem; letter-spacing: 1px; margin-top: 2px; }
  #company-list { flex: 1; overflow-y: auto; padding: 12px 10px; }
  .co-label { font-size: 0.66rem; letter-spacing: 2px; color: #556; text-transform: uppercase; padding: 6px 10px; }
  .co-item {
    padding: 10px 12px; border-radius: 8px; cursor: pointer; margin-bottom: 4px;
    border: 1px solid transparent; transition: background .15s, border-color .15s;
  }
  .co-item:hover { background: var(--surface2); }
  .co-item.active { background: var(--surface2); border-color: var(--accent-dim); }
  .co-item .co-name { font-weight: 600; }
  .co-item .co-meta { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }
  #sidebar-footer { padding: 12px; border-top: 1px solid var(--border); }

  /* ── Main ── */
  #main { flex: 1; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
  #topbar {
    padding: 18px 28px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 24px; flex-wrap: wrap;
  }
  #topbar h2 { font-size: 1.3rem; }
  #topbar .legal { color: var(--muted); font-size: 0.8rem; }
  .stat-row { display: flex; gap: 22px; margin-left: auto; flex-wrap: wrap; }
  .stat { text-align: right; }
  .stat .v { font-size: 1.1rem; font-weight: 700; color: var(--accent); }
  .stat .k { font-size: 0.66rem; letter-spacing: 1px; color: var(--muted); text-transform: uppercase; }
  .stat.warn .v { color: var(--warn); }

  #tabs { display: flex; gap: 4px; padding: 0 24px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
  .tab {
    padding: 12px 16px; cursor: pointer; color: var(--muted); font-size: 0.86rem;
    border-bottom: 2px solid transparent; user-select: none;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  #content { flex: 1; overflow-y: auto; padding: 24px 28px 80px; }

  /* ── Buttons ── */
  .btn {
    background: var(--surface2); color: var(--text); border: 1px solid var(--border);
    padding: 8px 14px; border-radius: 8px; cursor: pointer; font-size: 0.84rem;
    transition: background .15s, border-color .15s; display: inline-flex; align-items: center; gap: 6px;
  }
  .btn:hover { border-color: var(--accent); }
  .btn-primary { background: var(--accent); color: #06281a; border-color: var(--accent); font-weight: 600; }
  .btn-primary:hover { filter: brightness(1.08); }
  .btn-ghost { background: transparent; }
  .btn-danger { color: var(--danger); border-color: #f8717144; }
  .btn-danger:hover { background: #f8717118; border-color: var(--danger); }
  .btn-sm { padding: 5px 10px; font-size: 0.78rem; }
  .btn:disabled { opacity: .45; cursor: not-allowed; }

  .toolbar { display: flex; gap: 10px; align-items: center; margin-bottom: 18px; flex-wrap: wrap; }
  .toolbar .spacer { flex: 1; }
  input.search {
    background: var(--surface); border: 1px solid var(--border); color: var(--text);
    padding: 8px 12px; border-radius: 8px; min-width: 220px; font-size: 0.84rem;
  }
  input.search:focus { outline: none; border-color: var(--accent); }

  /* ── Cards / sections ── */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
  .section-title { font-size: 0.72rem; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-bottom: 14px; }

  /* ── Tables ── */
  table { border-collapse: collapse; width: 100%; }
  th, td { text-align: left; padding: 11px 12px; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
  th { color: var(--muted); font-weight: 600; font-size: 0.72rem; letter-spacing: 1px; text-transform: uppercase; }
  tbody tr { transition: background .12s; }
  tbody tr.clickable { cursor: pointer; }
  tbody tr.clickable:hover { background: var(--surface2); }
  td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }
  .badge {
    display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 0.7rem;
    background: var(--surface2); border: 1px solid var(--border); color: var(--muted);
  }
  .badge.person { color: #93c5fd; border-color: #93c5fd33; }
  .badge.company { color: var(--accent); border-color: var(--accent-dim); }
  .badge.issue { color: var(--accent); }
  .badge.sale { color: var(--warn); }

  .bar { height: 7px; border-radius: 4px; background: var(--surface2); overflow: hidden; min-width: 80px; }
  .bar > span { display: block; height: 100%; background: var(--accent); }

  .empty { color: var(--muted); text-align: center; padding: 60px 20px; }
  .empty .big { font-size: 2.4rem; margin-bottom: 10px; }

  /* ── Apppp-Listenansicht: Sortierung + Feldselektor ── */
  table.lv th { cursor: default; white-space: nowrap; user-select: none; }
  table.lv th.sortable { cursor: pointer; }
  table.lv th.sortable:hover { color: var(--text); }
  table.lv th.sort-asc, table.lv th.sort-desc { color: var(--accent); }
  table.lv th.sort-asc .th-label::after  { content: ' ▲'; font-size: 0.62rem; }
  table.lv th.sort-desc .th-label::after { content: ' ▼'; font-size: 0.62rem; }
  table.lv td { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  table.lv tfoot td { border-top: 1px solid var(--border); }
  .lv-colbtn, .lv-groupbtn { padding: 6px 10px; }
  .lv-groupbtn.on { border-color: var(--accent); color: var(--accent); }
  #lv-colmenu, #lv-groupmenu {
    display: none; position: fixed; background: var(--surface);
    border: 1px solid var(--border); border-radius: 8px; min-width: 190px;
    z-index: 1500; box-shadow: 0 8px 24px #00000066; overflow: hidden; padding: 4px 0;
  }
  #lv-colmenu.open, #lv-groupmenu.open { display: block; }
  #lv-colmenu .vis-label, #lv-groupmenu .vis-label { font-size: 0.66rem; letter-spacing: 1px; color: var(--muted); text-transform: uppercase; padding: 9px 14px 5px; }
  #lv-colmenu .vis-option, #lv-groupmenu .vis-option { display: flex; align-items: center; gap: 10px; padding: 8px 14px; font-size: 0.84rem; cursor: pointer; }
  #lv-colmenu .vis-option:hover, #lv-groupmenu .vis-option:hover { background: var(--surface2); }
  #lv-colmenu .vis-option input, #lv-groupmenu .vis-option input { accent-color: var(--accent); width: 14px; height: 14px; cursor: pointer; }

  /* Gruppen-Kopfzeilen in der Liste */
  table.lv tr.lv-group { cursor: pointer; user-select: none; background: var(--surface2); }
  table.lv tr.lv-group:hover td { color: var(--accent); }
  table.lv tr.lv-group td { font-size: 0.82rem; font-weight: 600; white-space: nowrap; }
  table.lv tr.lv-group .lv-grp-caret { color: var(--accent); display: inline-block; width: 1.1em; }
  table.lv tr.lv-group .lv-grp-label { margin-right: 9px; }
  table.lv tr.lv-group .lv-grp-count { color: var(--muted); font-weight: 600; background: var(--bg); border-radius: 999px; padding: 1px 9px; font-size: 0.72rem; }

  /* Spalten-Drag */
  table.lv th.col-dragging { opacity: .4; }
  table.lv th.col-drag-over { border-left: 2px solid var(--accent); }

  /* ── Odoo-Suchfeld (1:1 aus Apppp) ── */
  .search-wrap {
    position: relative; display: flex; flex-wrap: wrap; align-items: center; gap: 6px;
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    padding: 5px 10px; min-width: 300px; max-width: 560px; flex: 1; cursor: text; transition: border-color .15s;
  }
  .search-wrap:focus-within { border-color: var(--accent); }
  .search-chips { display: contents; }
  .search-chip {
    display: inline-flex; align-items: center; gap: 5px; background: var(--surface2);
    border: 1px solid var(--accent); border-radius: 20px; padding: 2px 10px 2px 8px;
    font-size: .8rem; color: var(--accent); white-space: nowrap;
  }
  .search-chip .chip-label { color: var(--muted); margin-right: 2px; font-size: .72rem; }
  .search-chip .chip-remove { cursor: pointer; opacity: .6; font-size: .9rem; line-height: 1; padding: 0 2px; }
  .search-chip .chip-remove:hover { opacity: 1; color: var(--danger); }
  .search-input { border: none; background: transparent; color: var(--text); font-size: .88rem; outline: none; min-width: 120px; flex: 1; padding: 2px 0; }
  .search-input::placeholder { color: var(--muted); }
  .search-dd {
    display: none; position: absolute; top: calc(100% + 6px); left: 0; min-width: 100%;
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    z-index: 1400; box-shadow: 0 8px 24px #00000055; overflow: hidden;
  }
  .search-dd.open { display: block; }
  .sd-section { padding: 6px 0 2px; border-bottom: 1px solid var(--border); }
  .sd-section:last-child { border-bottom: none; }
  .sd-section-label { font-size: .68rem; color: var(--muted); letter-spacing: 1px; padding: 2px 14px 4px; text-transform: uppercase; }
  .sd-item { padding: 7px 14px; font-size: .86rem; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: background .1s; }
  .sd-item:hover, .sd-item.active { background: var(--surface2); }
  .sd-item .sd-cat { color: var(--muted); font-size: .78rem; margin-left: auto; }
  .sd-item .sd-val { color: var(--text); }
  .sd-item .sd-val em { color: var(--accent); font-style: normal; font-weight: 600; }

  /* ── Forms / Modal ── */
  #overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.55); backdrop-filter: blur(3px);
    display: none; align-items: flex-start; justify-content: center; z-index: 1000; padding: 40px 16px; overflow-y: auto;
  }
  #overlay.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; width: 100%; max-width: 640px; }
  .modal.wide { max-width: 820px; }
  .modal-head { padding: 18px 22px; border-bottom: 1px solid var(--border); display: flex; align-items: center; }
  .modal-head h3 { font-size: 1.05rem; }
  .modal-head .x { margin-left: auto; cursor: pointer; color: var(--muted); font-size: 1.3rem; line-height: 1; }
  .modal-head .x:hover { color: var(--text); }
  .modal-body { padding: 22px; }
  .modal-foot { padding: 16px 22px; border-top: 1px solid var(--border); display: flex; gap: 10px; justify-content: flex-end; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px 16px; }
  .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px 16px; }
  .field { display: flex; flex-direction: column; gap: 5px; }
  .field.col-span-2 { grid-column: 1 / -1; }
  .field label { font-size: 0.72rem; letter-spacing: .5px; color: var(--muted); }
  .field input, .field select, .field textarea {
    background: var(--bg); border: 1px solid var(--border); color: var(--text);
    padding: 9px 11px; border-radius: 8px; font-size: 0.86rem; font-family: inherit;
  }
  .field input:focus, .field select:focus, .field textarea:focus { outline: none; border-color: var(--accent); }
  .field textarea { resize: vertical; min-height: 60px; }
  .form-section-title { font-size: 0.7rem; letter-spacing: 1.5px; color: var(--accent); text-transform: uppercase; margin: 20px 0 4px; grid-column: 1/-1; }
  .form-section-title:first-child { margin-top: 0; }

  /* ── Donut / analytics ── */
  .donut-wrap { display: flex; gap: 36px; align-items: center; flex-wrap: wrap; }
  .legend { display: flex; flex-direction: column; gap: 8px; min-width: 260px; }
  .legend-row { display: flex; align-items: center; gap: 10px; font-size: 0.85rem; }
  .legend-dot { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }
  .legend-row .lname { flex: 1; }
  .legend-row .lpct { font-weight: 600; font-variant-numeric: tabular-nums; }

  /* ── Toast ── */
  #toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--surface2); border: 1px solid var(--border); color: var(--text);
    padding: 12px 20px; border-radius: 10px; opacity: 0; pointer-events: none; transition: all .25s; z-index: 2000;
    max-width: 90vw;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  #toast.error { border-color: var(--danger); color: #fecaca; }

  .hint { font-size: 0.78rem; color: var(--muted); }
  .inline-new { border: 1px dashed var(--border); border-radius: 10px; padding: 14px; margin-top: 6px; }

  /* ── Print / PDF ── */
  #print-area { display: none; }
  @media print {
    @page { size: A4; margin: 18mm 16mm; }
    body { overflow: visible; display: block; background: #fff; color: #000; }
    #sidebar, #main, #overlay, #toast, #claudeapps-back { display: none !important; }
    #print-area { display: block !important; color: #000; font-family: 'Times New Roman', Georgia, serif; }
  }
  /* On-screen styling of print area when previewed (kept hidden normally) */
  #print-area .ph-head { display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 2px solid #000; padding-bottom: 8px; }
  #print-area h1 { font-size: 20pt; margin: 22px 0 2px; }
  #print-area .ph-sub { font-size: 11pt; color: #333; margin-bottom: 18px; }
  #print-area table { width: 100%; border-collapse: collapse; }
  #print-area th, #print-area td { border: 1px solid #444; padding: 6px 8px; font-size: 10.5pt; text-align: left; }
  #print-area th { background: #eee; }
  #print-area td.num, #print-area th.num { text-align: right; }
  #print-area tfoot td { font-weight: bold; background: #f4f4f4; }
  #print-area .sig-block { margin-top: 56px; display: flex; gap: 60px; }
  #print-area .sig { flex: 1; }
  #print-area .sig .line { border-top: 1px solid #000; margin-top: 46px; padding-top: 4px; font-size: 9.5pt; }
  #print-area .ph-meta { font-size: 10pt; color: #222; }
</style>
</head>
<body>

<aside id="sidebar">
  <div id="sidebar-header">
    <h1>SHARE HANDLING</h1>
    <p>Aktienregister-Verwaltung</p>
  </div>
  <div id="company-list"></div>
  <div id="sidebar-footer">
    <button class="btn btn-primary" style="width:100%; justify-content:center" onclick="openCompanyModal()">+ Unternehmen</button>
  </div>
</aside>

<div id="main">
  <div id="topbar"><h2>—</h2></div>
  <div id="tabs"></div>
  <div id="content"></div>
</div>

<div id="overlay"><div class="modal" id="modal"></div></div>
<div id="toast"></div>
<div id="print-area"></div>

<script src="/claudeapps/shared/back-button.js"></script>
<script>
const API = '/claudeapps/sharehandling/api';
const TABS = [
  { id: 'register', label: 'Register' },
  { id: 'shareholders', label: 'Aktionäre' },
  { id: 'transactions', label: 'Transaktionen' },
  { id: 'analytics', label: 'Auswertung' },
  { id: 'snapshots', label: 'Snapshots' },
  { id: 'company', label: 'Stammdaten' },
];
const PALETTE = ['#4ade80','#60a5fa','#fbbf24','#f87171','#a78bfa','#34d399','#fb923c','#f472b6','#22d3ee','#facc15','#818cf8','#2dd4bf'];

const state = {
  companies: [],
  currentId: null,
  tab: 'register',
  register: null,      // {company, holders, issued_shares, total_shares, free_shares, base_shares, holder_count}
  shareholders: [],
  transactions: [],
  snapshots: [],
  search: '',
};

// ── API helper ──
async function api(path, opts = {}) {
  const res = await fetch(API + path, {
    headers: { 'Content-Type': 'application/json' },
    ...opts,
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  });
  let data = null;
  try { data = await res.json(); } catch {}
  if (!res.ok) throw new Error((data && data.error) || ('Fehler ' + res.status));
  return data;
}

// ── Formatting ──
const nfInt = new Intl.NumberFormat('de-DE');
const fmtInt = n => nfInt.format(n || 0);
const fmtPct = n => (n || 0).toLocaleString('de-DE', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' %';
function fmtMoney(n, cur) {
  if (n == null || n === '') return '–';
  return n.toLocaleString('de-DE', { style: 'currency', currency: cur || 'EUR' });
}
function esc(s) { return (s == null ? '' : String(s)).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])); }

function toast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show' + (isError ? ' error' : '');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => t.className = '', 3200);
}

// ── Modal ──
function openModal(html, wide) {
  const m = document.getElementById('modal');
  m.className = 'modal' + (wide ? ' wide' : '');
  m.innerHTML = html;
  document.getElementById('overlay').classList.add('open');
}
function closeModal() { document.getElementById('overlay').classList.remove('open'); }
document.getElementById('overlay').addEventListener('click', e => { if (e.target.id === 'overlay') closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ── Boot ──
async function boot() {
  await loadCompanies();
  if (state.companies.length) {
    const saved = Number(localStorage.getItem('sh_current'));
    selectCompany(state.companies.find(c => c.id === saved) ? saved : state.companies[0].id);
  } else {
    renderSidebar();
    renderEmptyApp();
  }
}

async function loadCompanies() {
  state.companies = await api('/companies');
  renderSidebar();
}

function renderSidebar() {
  const el = document.getElementById('company-list');
  if (!state.companies.length) {
    el.innerHTML = '<div class="co-label">Unternehmen</div><div class="hint" style="padding:10px 12px">Noch keine Gesellschaft angelegt.</div>';
    return;
  }
  el.innerHTML = '<div class="co-label">Unternehmen</div>' + state.companies.map(c => `
    <div class="co-item ${c.id === state.currentId ? 'active' : ''}" onclick="selectCompany(${c.id})">
      <div class="co-name">${esc(c.name)}</div>
      <div class="co-meta">${esc(c.legal_form || '')} · ${fmtInt(c.issued_shares)} Aktien · ${c.holder_count} Aktionäre</div>
    </div>`).join('');
}

function renderEmptyApp() {
  document.getElementById('topbar').innerHTML = '<h2>Willkommen</h2>';
  document.getElementById('tabs').innerHTML = '';
  document.getElementById('content').innerHTML = `
    <div class="empty">
      <div class="big">📈</div>
      <p>Lege dein erstes Unternehmen an, um das Aktienregister zu führen.</p>
      <br><button class="btn btn-primary" onclick="openCompanyModal()">+ Unternehmen anlegen</button>
    </div>`;
}

async function selectCompany(id) {
  state.currentId = id;
  state.search = '';
  localStorage.setItem('sh_current', id);
  renderSidebar();
  await refreshCompany();
  renderTabs();
  renderTab();
}

async function refreshCompany() {
  const [reg, shs, txs, snaps] = await Promise.all([
    api('/companies/' + state.currentId),
    api('/companies/' + state.currentId + '/shareholders'),
    api('/companies/' + state.currentId + '/transactions'),
    api('/companies/' + state.currentId + '/snapshots'),
  ]);
  state.register = reg; state.shareholders = shs; state.transactions = txs; state.snapshots = snaps;
  renderTopbar();
  // keep sidebar counts fresh
  await loadCompanies();
}

function renderTopbar() {
  const r = state.register; const c = r.company;
  const free = c.total_shares ? r.free_shares : null;
  document.getElementById('topbar').innerHTML = `
    <div>
      <h2>${esc(c.name)}</h2>
      <div class="legal">${esc(c.legal_form || '')}${c.seat ? ' · Sitz ' + esc(c.seat) : ''}</div>
    </div>
    <div class="stat-row">
      <div class="stat"><div class="v">${fmtInt(r.total_shares || r.issued_shares)}</div><div class="k">Gesamt</div></div>
      <div class="stat"><div class="v">${fmtInt(r.issued_shares)}</div><div class="k">Ausgegeben</div></div>
      ${free != null ? `<div class="stat ${free > 0 ? 'warn' : ''}"><div class="v">${fmtInt(free)}</div><div class="k">Frei</div></div>` : ''}
      <div class="stat"><div class="v">${r.holder_count}</div><div class="k">Aktionäre</div></div>
    </div>`;
}

function renderTabs() {
  document.getElementById('tabs').innerHTML = TABS.map(t =>
    `<div class="tab ${t.id === state.tab ? 'active' : ''}" onclick="switchTab('${t.id}')">${t.label}</div>`).join('');
}
function switchTab(id) { state.tab = id; state.search = ''; renderTabs(); renderTab(); }

function renderTab() {
  const fn = { register: renderRegister, shareholders: renderShareholders, transactions: renderTransactions,
    analytics: renderAnalytics, snapshots: renderSnapshots, company: renderCompanyTab }[state.tab];
  fn();
}

// ════════ Generische Listenansicht (Apppp-Stil: Sortierung, Feldselektor, Spalten-Drag, Odoo-Suche) ════════
// columns: [{ key, label, visLabel?, get?(row), render?(row,i), align:'num'?, sortable:false?,
//             fixed:true?(nicht ausblendbar), pinned:'left'|'right'?(feste Position, nicht verschiebbar) }]
const LV_COLUMNS = {};    // entity -> aktuelle Spaltendefinition
const lvSortState = {};   // entity -> { key, dir }
const lvChipState = {};   // entity -> [ {type, value, label} ]
let activeLV = null;      // aktuell gemountete Listen-Konfiguration
let lvColDragSrc = null;  // Schlüssel der gerade gezogenen Spalte
let lvSelField = null;    // aktuell gewähltes Suchfeld
const lvGroupState = {};  // entity -> aktuell gruppierte Spalte (key) oder null
const lvCollapsed = {};   // entity -> Set kollabierter Gruppen-Keys

// ── Persistenz ──
function lvHidden(entity) {
  try { return new Set(JSON.parse(localStorage.getItem('sh_cols_' + entity) || '[]')); }
  catch { return new Set(); }
}
function lvSaveHidden(entity, set) { localStorage.setItem('sh_cols_' + entity, JSON.stringify([...set])); }
function lvOrder(entity, columns) {
  const movable = columns.filter(c => !c.pinned).map(c => c.key);
  let stored = [];
  try { stored = JSON.parse(localStorage.getItem('sh_order_' + entity) || '[]'); } catch {}
  return [...stored.filter(k => movable.includes(k)), ...movable.filter(k => !stored.includes(k))];
}
function lvSaveOrder(entity, order) { localStorage.setItem('sh_order_' + entity, JSON.stringify(order)); }
function lvSort(entity) {
  if (!lvSortState[entity]) {
    let s = {}; try { s = JSON.parse(localStorage.getItem('sh_sort_' + entity) || '{}'); } catch {}
    lvSortState[entity] = { key: s.key || null, dir: s.dir || null };
  }
  return lvSortState[entity];
}
function lvCmp(a, b) {
  if (a == null && b == null) return 0;
  if (a == null) return 1;
  if (b == null) return -1;
  if (typeof a === 'number' && typeof b === 'number') return a - b;
  return String(a).localeCompare(String(b), 'de', { numeric: true, sensitivity: 'base' });
}
function lvChips(entity) { if (!lvChipState[entity]) lvChipState[entity] = []; return lvChipState[entity]; }

// ── Gruppierung (Persistenz + Helfer) ──
function lvGroup(entity) {
  if (!(entity in lvGroupState)) lvGroupState[entity] = localStorage.getItem('sh_group_' + entity) || null;
  return lvGroupState[entity];
}
function lvSetGroup(entity, key) {
  lvGroupState[entity] = key || null;
  if (key) localStorage.setItem('sh_group_' + entity, key); else localStorage.removeItem('sh_group_' + entity);
  lvCollapsed[entity] = new Set();
  if (activeLV && activeLV.entity === entity) lvRenderBody(activeLV);
  lvRefreshGroupMenu(entity);
}
function lvCollapsedSet(entity) { if (!lvCollapsed[entity]) lvCollapsed[entity] = new Set(); return lvCollapsed[entity]; }
// Gruppierbar: alle Felder, die als Spalte in der Liste vorkommen (außer Nr./Balken/Aktionen + fixe Positionen)
function lvGroupableCols(entity) {
  return (LV_COLUMNS[entity] || []).filter(c => (c.label || c.visLabel) && c.sortable !== false && !c.pinned);
}

function lvOrderedCols(cfg) {
  const hidden = lvHidden(cfg.entity);
  const byKey = Object.fromEntries(cfg.columns.map(c => [c.key, c]));
  const left = cfg.columns.filter(c => c.pinned === 'left');
  const right = cfg.columns.filter(c => c.pinned === 'right');
  const movable = lvOrder(cfg.entity, cfg.columns).map(k => byKey[k]).filter(Boolean);
  return [...left, ...movable, ...right].filter(c => c.fixed || c.pinned || !hidden.has(c.key));
}

// ── Mount: Toolbar (einmalig, fokus-stabil) + Tabellen-Container ──
function mountListView(cfg) {
  activeLV = cfg;
  LV_COLUMNS[cfg.entity] = cfg.columns;
  document.getElementById('content').innerHTML = `
    <div class="toolbar">
      ${cfg.toolbarLeft || ''}
      <div class="search-wrap" id="lv-search-wrap">
        <div class="search-chips" id="lv-chips"></div>
        <input class="search-input" id="lv-search-input" type="text" autocomplete="off" placeholder="Suchen…" />
        <div class="search-dd" id="lv-search-dd"></div>
      </div>
      <div class="hint" id="lv-hint"></div>
      ${lvGroupButton(cfg.entity)}
      ${lvColButton(cfg.entity)}
    </div>
    <div class="card" style="overflow-x:auto" id="lv-body"></div>`;
  lvBindSearch(cfg);
  cfg._renderChips();
  lvRenderBody(cfg);
}

// ── Nur Header + Body neu rendern (bei Sort / Filter / Drag) ──
function lvRenderBody(cfg) {
  const entity = cfg.entity;
  LV_COLUMNS[entity] = cfg.columns;
  const vis = lvOrderedCols(cfg);
  const sort = lvSort(entity);
  const chips = lvChips(entity);

  let data = cfg.rows.filter(row => chips.every(chip => cfg.matchChip(row, chip)));
  if (sort.key && sort.dir) {
    const col = cfg.columns.find(c => c.key === sort.key);
    if (col) {
      const dir = sort.dir === 'asc' ? 1 : -1;
      const val = r => col.get ? col.get(r) : r[col.key];
      data.sort((a, b) => lvCmp(val(a), val(b)) * dir);
    }
  }

  const thead = vis.map(c => {
    const sortable = c.sortable !== false;
    const cls = [
      sortable ? 'sortable' : '',
      sort.key === c.key ? 'sort-' + sort.dir : '',
      c.align === 'num' ? 'num' : ''
    ].filter(Boolean).join(' ');
    return `<th data-col="${esc(c.key)}" class="${cls}"${c.pinned ? '' : ' draggable="true"'}><span class="th-label">${esc(c.label)}</span></th>`;
  }).join('');

  const rowTr = (row, i) => {
    const tds = vis.map(c =>
      `<td class="${c.align === 'num' ? 'num' : ''}">${c.render ? c.render(row, i) : esc(row[c.key])}</td>`
    ).join('');
    const click = cfg.rowClick ? ` class="clickable" onclick="${cfg.rowClick}(${row[cfg.idKey || 'id']})"` : '';
    return `<tr${click}>${tds}</tr>`;
  };

  const groupKey = lvGroup(entity);
  const groupCol = groupKey ? cfg.columns.find(c => c.key === groupKey) : null;

  let body;
  if (!data.length) {
    body = `<tr><td colspan="${vis.length}" class="empty" style="padding:40px">${esc(chips.length ? 'Keine Treffer.' : (cfg.emptyText || 'Keine Daten.'))}</td></tr>`;
  } else if (groupCol) {
    const gval = row => groupCol.get ? groupCol.get(row) : row[groupCol.key];
    const groups = []; const idx = new Map();
    data.forEach(row => {
      const raw = gval(row);
      const empty = raw == null || raw === '';
      const gkey = empty ? '__none__' : String(raw);
      if (!idx.has(gkey)) { idx.set(gkey, groups.length); groups.push({ gkey, empty, sample: row, rows: [] }); }
      groups[idx.get(gkey)].rows.push(row);
    });
    groups.sort((a, b) => a.empty ? 1 : b.empty ? -1 : lvCmp(gval(a.sample), gval(b.sample)));
    const collapsed = lvCollapsedSet(entity);
    let i = 0;
    body = groups.map(g => {
      const isCol = collapsed.has(g.gkey);
      const label = g.empty ? '<span class="hint">(leer)</span>'
        : (groupCol.render ? groupCol.render(g.sample, 0) : esc(g.gkey));
      const head = `<tr class="lv-group" data-gkey="${esc(g.gkey)}"><td colspan="${vis.length}">` +
        `<span class="lv-grp-caret">${isCol ? '▸' : '▾'}</span>` +
        `<span class="lv-grp-label">${label}</span>` +
        `<span class="lv-grp-count">${g.rows.length}</span></td></tr>`;
      return isCol ? head : head + g.rows.map(r => rowTr(r, i++)).join('');
    }).join('');
  } else {
    body = data.map((row, i) => rowTr(row, i)).join('');
  }

  const foot = (cfg.footer && data.length) ? cfg.footer(data, vis) : '';
  let html = `<table class="lv"><thead><tr>${thead}</tr></thead><tbody>${body}</tbody>${foot}</table>`;
  if (cfg.belowHtml) html += cfg.belowHtml;
  document.getElementById('lv-body').innerHTML = html;

  if (groupCol) {
    document.querySelectorAll('#lv-body tr.lv-group').forEach(tr => {
      tr.addEventListener('click', () => {
        const set = lvCollapsedSet(entity);
        const gk = tr.dataset.gkey;
        set.has(gk) ? set.delete(gk) : set.add(gk);
        lvRenderBody(cfg);
      });
    });
  }
  const gbtn = document.querySelector('.lv-groupbtn');
  if (gbtn) gbtn.classList.toggle('on', !!groupCol);

  const hintEl = document.getElementById('lv-hint');
  if (hintEl) {
    let h = cfg.hint ? cfg.hint(data, cfg.rows) : `${data.length} Einträge`;
    if (groupCol) h += ` · gruppiert nach ${esc(groupCol.visLabel || groupCol.label)}`;
    hintEl.innerHTML = h;
  }

  lvBindHeader(cfg);
}

// ── Sort-Klick + Spalten-Drag an die frisch gerenderten Header binden ──
function lvBindHeader(cfg) {
  const head = document.querySelector('#lv-body thead tr');
  if (!head) return;
  head.querySelectorAll('th[data-col]').forEach(th => {
    const key = th.dataset.col;
    const col = cfg.columns.find(c => c.key === key);
    if (!col) return;
    if (col.sortable !== false) {
      const lbl = th.querySelector('.th-label');
      if (lbl) lbl.addEventListener('click', () => {
        const s = lvSort(cfg.entity);
        if (s.key !== key) { s.key = key; s.dir = 'asc'; }
        else if (s.dir === 'asc') s.dir = 'desc';
        else { s.key = null; s.dir = null; }
        localStorage.setItem('sh_sort_' + cfg.entity, JSON.stringify(s));
        lvRenderBody(cfg);
      });
    }
    if (!col.pinned) {
      th.addEventListener('dragstart', e => { lvColDragSrc = key; e.dataTransfer.effectAllowed = 'move'; th.classList.add('col-dragging'); });
      th.addEventListener('dragend', () => { th.classList.remove('col-dragging'); head.querySelectorAll('th').forEach(el => el.classList.remove('col-drag-over')); });
      th.addEventListener('dragover', e => {
        if (!lvColDragSrc || lvColDragSrc === key) return;
        e.preventDefault(); e.dataTransfer.dropEffect = 'move';
        head.querySelectorAll('th').forEach(el => el.classList.remove('col-drag-over'));
        th.classList.add('col-drag-over');
      });
      th.addEventListener('dragleave', () => th.classList.remove('col-drag-over'));
      th.addEventListener('drop', e => {
        e.preventDefault();
        if (!lvColDragSrc || lvColDragSrc === key) return;
        const order = lvOrder(cfg.entity, cfg.columns);
        const fi = order.indexOf(lvColDragSrc), ti = order.indexOf(key);
        if (fi >= 0 && ti >= 0) { order.splice(fi, 1); order.splice(ti, 0, lvColDragSrc); lvSaveOrder(cfg.entity, order); }
        lvColDragSrc = null;
        lvRenderBody(cfg);
      });
    }
  });
}

// ── Odoo-Suchfeld: Feld → Wert → Chip ──
function lvMatchFactory(fields) {
  return (row, chip) => {
    const f = fields.find(f => f.key === chip.type);
    if (!f) return true;
    const v = f.get ? f.get(row) : row[chip.type];
    if (f.type === 'enum') return String(v) === String(chip.value);
    return String(v == null ? '' : v).toLowerCase().includes(String(chip.value).toLowerCase());
  };
}
function lvFieldValues(fields, fieldKey, rows) {
  const f = fields.find(f => f.key === fieldKey);
  if (!f || f.type !== 'enum') return [];
  if (f.values) return f.values;
  const seen = new Map();
  rows.forEach(r => { const v = f.get ? f.get(r) : r[fieldKey]; if (v != null && v !== '') seen.set(String(v), String(v)); });
  return [...seen.keys()].sort((a, b) => a.localeCompare(b, 'de')).map(v => ({ label: v, value: v }));
}
function lvBindSearch(cfg) {
  const fields = cfg.searchFields || [];
  const wrap = document.getElementById('lv-search-wrap');
  const input = document.getElementById('lv-search-input');
  const dd = document.getElementById('lv-search-dd');
  const chipsEl = document.getElementById('lv-chips');
  if (!wrap || !input) { cfg._renderChips = () => {}; return; }
  lvSelField = null;

  const close = () => dd.classList.remove('open');
  const updatePlaceholder = () => {
    const f = fields.find(f => f.key === lvSelField);
    input.placeholder = lvSelField ? ((f ? f.label : lvSelField) + ' eingeben…') : 'Suchen…';
  };
  cfg._renderChips = () => {
    chipsEl.innerHTML = '';
    lvChips(cfg.entity).forEach((chip, i) => {
      const f = fields.find(f => f.key === chip.type) || {};
      const div = document.createElement('div'); div.className = 'search-chip';
      div.innerHTML = `<span class="chip-label">${esc(f.label || chip.type)}:</span><span>${esc(chip.label)}</span><span class="chip-remove">×</span>`;
      div.querySelector('.chip-remove').addEventListener('click', e => {
        e.stopPropagation(); lvChips(cfg.entity).splice(i, 1); cfg._renderChips(); lvRenderBody(cfg);
      });
      chipsEl.appendChild(div);
    });
  };
  const addChip = chip => {
    const arr = lvChips(cfg.entity);
    input.value = ''; lvSelField = null; updatePlaceholder(); close();
    if (arr.some(c => c.type === chip.type && c.value === chip.value)) return;
    arr.push(chip); cfg._renderChips(); lvRenderBody(cfg);
  };
  const buildFieldDD = () => {
    dd.innerHTML = ''; dd._items = [];
    const sec = document.createElement('div'); sec.className = 'sd-section';
    const lbl = document.createElement('div'); lbl.className = 'sd-section-label'; lbl.textContent = 'Filtern nach'; sec.appendChild(lbl);
    fields.forEach(f => {
      const row = document.createElement('div'); row.className = 'sd-item';
      row.innerHTML = `<span style="font-size:1rem">${f.icon || ''}</span><span class="sd-val">${esc(f.label)}</span><span class="sd-cat">›</span>`;
      row.addEventListener('mousedown', e => {
        e.preventDefault(); lvSelField = f.key;
        const q = input.value.trim();
        if (q && f.type !== 'enum') { addChip({ type: f.key, value: q, label: q }); return; }
        updatePlaceholder(); close();
        setTimeout(() => { input.focus(); buildValueDD(input.value); }, 0);
      });
      sec.appendChild(row); dd._items.push({ el: row, isField: true, fieldKey: f.key });
    });
    dd.appendChild(sec); dd.classList.add('open');
  };
  const buildValueDD = q => {
    dd.innerHTML = ''; dd._items = [];
    const f = fields.find(f => f.key === lvSelField);
    const back = document.createElement('div'); back.className = 'sd-item';
    back.innerHTML = `<span style="opacity:0.5">←</span><span class="sd-cat">${esc(f ? f.label : '')}</span>`;
    back.addEventListener('mousedown', e => { e.preventDefault(); lvSelField = null; input.value = ''; updatePlaceholder(); buildFieldDD(); input.focus(); });
    dd.appendChild(back);
    const sec = document.createElement('div'); sec.className = 'sd-section';
    const ql = (q || '').trim().toLowerCase();
    lvFieldValues(fields, lvSelField, cfg.rows)
      .filter(it => !ql || String(it.label).toLowerCase().includes(ql))
      .forEach(it => {
        const row = document.createElement('div'); row.className = 'sd-item';
        row.innerHTML = `<span class="sd-val">${esc(it.label)}</span>`;
        row.addEventListener('mousedown', e => { e.preventDefault(); addChip({ type: lvSelField, value: it.value, label: it.label }); });
        sec.appendChild(row); dd._items.push({ el: row, chip: { type: lvSelField, value: it.value, label: it.label } });
      });
    if (f && f.type !== 'enum' && ql) {
      const row = document.createElement('div'); row.className = 'sd-item';
      row.innerHTML = `<span class="sd-val">„<em>${esc(q.trim())}</em>" suchen</span>`;
      row.addEventListener('mousedown', e => { e.preventDefault(); addChip({ type: lvSelField, value: q.trim(), label: q.trim() }); });
      sec.appendChild(row); dd._items.push({ el: row, chip: { type: lvSelField, value: q.trim(), label: q.trim() } });
    }
    if (!dd._items.length) {
      const empty = document.createElement('div'); empty.className = 'sd-item'; empty.innerHTML = '<span class="sd-cat">Keine Treffer</span>'; sec.appendChild(empty);
    }
    dd.appendChild(sec); dd.classList.add('open');
  };
  input.addEventListener('input', () => { lvSelField ? buildValueDD(input.value) : buildFieldDD(); });
  input.addEventListener('focus', () => { lvSelField ? buildValueDD(input.value) : buildFieldDD(); });
  input.addEventListener('keydown', e => {
    const items = dd._items || [];
    if (e.key === 'Enter') {
      e.preventDefault(); const q = input.value.trim();
      if (lvSelField) {
        const f = fields.find(f => f.key === lvSelField);
        if (items[0] && items[0].chip) addChip(items[0].chip);
        else if (q && f && f.type !== 'enum') addChip({ type: lvSelField, value: q, label: q });
      } else if (q) {
        const def = fields.find(f => f.type !== 'enum') || fields[0];
        if (def) addChip({ type: def.key, value: q, label: q });
      }
    } else if (e.key === 'Escape') {
      if (lvSelField) { lvSelField = null; updatePlaceholder(); buildFieldDD(); } else close();
    } else if (e.key === 'Backspace' && input.value === '') {
      if (lvSelField) { lvSelField = null; updatePlaceholder(); buildFieldDD(); }
      else { const arr = lvChips(cfg.entity); if (arr.length) { arr.splice(-1, 1); cfg._renderChips(); lvRenderBody(cfg); } }
    }
  });
  wrap.addEventListener('click', () => input.focus());
  if (!window._lvSearchDocBound) {
    window._lvSearchDocBound = true;
    // mousedown statt click: mousedown trifft immer das echte Element; ein click kann durch
    // ein zwischenzeitlich ausgeblendetes Dropdown auf die Tabelle dahinter „durchrutschen".
    document.addEventListener('mousedown', e => {
      const w = document.getElementById('lv-search-wrap');
      const d = document.getElementById('lv-search-dd');
      if (w && d && !w.contains(e.target)) {
        d.classList.remove('open'); lvSelField = null;
        const inp = document.getElementById('lv-search-input'); if (inp) inp.placeholder = 'Suchen…';
      }
    });
  }
  updatePlaceholder();
}

// ── Feldselektor-Button + Popup ──
function lvColButton(entity) {
  return `<button class="btn btn-sm lv-colbtn" title="Spalten ein-/ausblenden" onclick="lvOpenMenu(event,'${entity}')">▦ Spalten ▾</button>`;
}
function lvToggleCol(entity, key) {
  const h = lvHidden(entity);
  h.has(key) ? h.delete(key) : h.add(key);
  lvSaveHidden(entity, h);
  if (activeLV && activeLV.entity === entity) lvRenderBody(activeLV);
  lvRefreshMenu(entity);
}
function lvMenuEl() {
  let m = document.getElementById('lv-colmenu');
  if (!m) {
    m = document.createElement('div'); m.id = 'lv-colmenu';
    document.body.appendChild(m);
    document.addEventListener('click', e => {
      if (m.classList.contains('open') && !m.contains(e.target) && !e.target.closest('.lv-colbtn')) m.classList.remove('open');
    });
  }
  return m;
}
function lvRefreshMenu(entity) {
  const m = document.getElementById('lv-colmenu');
  if (!m || !m.classList.contains('open') || m.dataset.entity !== entity) return;
  const cols = (LV_COLUMNS[entity] || []).filter(c => !c.fixed && !c.pinned && (c.visLabel || c.label));
  const hidden = lvHidden(entity);
  m.innerHTML = '<div class="vis-label">Spalten</div>' + cols.map(c =>
    `<label class="vis-option"><input type="checkbox" ${hidden.has(c.key) ? '' : 'checked'} onchange="lvToggleCol('${entity}','${c.key}')">${esc(c.visLabel || c.label)}</label>`
  ).join('');
}
function lvOpenMenu(ev, entity) {
  ev.stopPropagation();
  const m = lvMenuEl();
  if (m.classList.contains('open') && m.dataset.entity === entity) { m.classList.remove('open'); return; }
  m.dataset.entity = entity;
  m.classList.add('open');
  lvRefreshMenu(entity);
  const r = ev.currentTarget.getBoundingClientRect();
  m.style.top = (r.bottom + 6) + 'px';
  m.style.left = Math.max(8, Math.min(r.left, window.innerWidth - 210)) + 'px';
}

// ── Gruppieren-Button + Popup ──
function lvGroupButton(entity) {
  return `<button class="btn btn-sm lv-groupbtn" title="Nach Feld gruppieren" onclick="lvOpenGroupMenu(event,'${entity}')">⊞ Gruppieren ▾</button>`;
}
function lvGroupMenuEl() {
  let m = document.getElementById('lv-groupmenu');
  if (!m) {
    m = document.createElement('div'); m.id = 'lv-groupmenu';
    document.body.appendChild(m);
    document.addEventListener('click', e => {
      if (m.classList.contains('open') && !m.contains(e.target) && !e.target.closest('.lv-groupbtn')) m.classList.remove('open');
    });
  }
  return m;
}
function lvRefreshGroupMenu(entity) {
  const m = document.getElementById('lv-groupmenu');
  if (!m || !m.classList.contains('open') || m.dataset.entity !== entity) return;
  const cur = lvGroup(entity);
  const cols = lvGroupableCols(entity);
  m.innerHTML = '<div class="vis-label">Gruppieren nach</div>'
    + `<label class="vis-option"><input type="radio" name="lvgrp" ${!cur ? 'checked' : ''} onchange="lvSetGroup('${entity}',null)"><span class="hint">— keine —</span></label>`
    + cols.map(c => `<label class="vis-option"><input type="radio" name="lvgrp" ${cur === c.key ? 'checked' : ''} onchange="lvSetGroup('${entity}','${c.key}')">${esc(c.visLabel || c.label)}</label>`).join('');
}
function lvOpenGroupMenu(ev, entity) {
  ev.stopPropagation();
  const m = lvGroupMenuEl();
  if (m.classList.contains('open') && m.dataset.entity === entity) { m.classList.remove('open'); return; }
  m.dataset.entity = entity;
  m.classList.add('open');
  lvRefreshGroupMenu(entity);
  const r = ev.currentTarget.getBoundingClientRect();
  m.style.top = (r.bottom + 6) + 'px';
  m.style.left = Math.max(8, Math.min(r.left, window.innerWidth - 210)) + 'px';
}

// ════════ REGISTER TAB ════════
function renderRegister() {
  const r = state.register;
  const c = r.company;
  const hasNominal = c.nominal_value != null && c.nominal_value !== '';
  const totalShares = r.issued_shares || 1;

  // Flatten all blocks across all holders into one list
  const blocks = [];
  for (const h of r.holders) {
    for (const [cls, clsData] of Object.entries(h.classes)) {
      for (const blk of clsData.blocks) {
        blocks.push({
          name: h.name, type: h.type, city: h.city,
          shareClass: cls,
          start: blk.start, end: blk.end, shares: blk.shares,
          pct: blk.shares / totalShares * 100,
        });
      }
    }
  }
  // Default order: by share number ascending; blocks without numbers go to the end
  blocks.sort((a, b) => {
    if (a.start == null && b.start == null) return a.name.localeCompare(b.name);
    if (a.start == null) return 1;
    if (b.start == null) return -1;
    return a.start - b.start;
  });

  const columns = [
    { key: '_nr', label: 'Nr.', pinned: 'left', sortable: false, render: (b, i) => `<span style="color:var(--muted)">${i + 1}</span>` },
    { key: 'name', label: 'Aktionär', fixed: true, get: b => b.name, render: b => `<strong>${esc(b.name)}</strong> <span class="badge ${b.type}">${b.type === 'company' ? 'Firma' : 'Person'}</span>` },
    { key: 'city', label: 'Ort', get: b => b.city, render: b => esc(b.city || '') },
    { key: 'shareClass', label: 'Gattung', get: b => b.shareClass, render: b => `<span class="badge">${esc(b.shareClass)}</span>` },
    { key: 'start', label: 'Nr. von', align: 'num', get: b => b.start, render: b => b.start != null ? fmtInt(b.start) : '—' },
    { key: 'end', label: 'Nr. bis', align: 'num', get: b => b.end, render: b => b.end != null ? fmtInt(b.end) : '—' },
    { key: 'shares', label: 'Aktien', align: 'num', get: b => b.shares, render: b => fmtInt(b.shares) },
    ...(hasNominal ? [{ key: 'nominal', label: 'Nennbetrag', align: 'num', get: b => b.shares * c.nominal_value, render: b => fmtMoney(b.shares * c.nominal_value, c.currency) }] : []),
    { key: 'pct', label: 'Anteil', align: 'num', get: b => b.pct, render: b => fmtPct(b.pct) },
    { key: 'bar', label: '', visLabel: 'Anteil-Balken', sortable: false, render: b => `<div class="bar"><span style="width:${Math.min(100, b.pct)}%"></span></div>` },
  ];

  const footer = (data, vis) => {
    const sumShares = data.reduce((a, b) => a + b.shares, 0);
    const sumPct = data.reduce((a, b) => a + b.pct, 0);
    const cells = vis.map(col => {
      if (col.key === 'name') return `<td>Summe (${r.holder_count} Aktionäre · ${data.length} Blöcke)</td>`;
      if (col.key === 'shares') return `<td class="num">${fmtInt(sumShares)}</td>`;
      if (col.key === 'nominal') return `<td class="num">${fmtMoney(sumShares * c.nominal_value, c.currency)}</td>`;
      if (col.key === 'pct') return `<td class="num">${fmtPct(sumPct)}</td>`;
      return '<td></td>';
    }).join('');
    return `<tfoot><tr style="font-weight:700">${cells}</tr></tfoot>`;
  };

  const fields = [
    { key: 'name', label: 'Aktionär', icon: '🔍', type: 'text', get: b => b.name },
    { key: 'city', label: 'Ort', icon: '📍', type: 'text', get: b => b.city },
    { key: 'shareClass', label: 'Gattung', icon: '🏷️', type: 'enum', get: b => b.shareClass },
    { key: 'type', label: 'Typ', icon: '👤', type: 'enum', get: b => b.type, values: [{ label: 'Person', value: 'person' }, { label: 'Firma', value: 'company' }] },
  ];

  mountListView({
    entity: 'register', columns, rows: blocks, emptyText: 'Noch keine Aktien zugeteilt.', footer,
    toolbarLeft: '<button class="btn btn-primary" onclick="openSnapshotModal()">+ Festschreiben</button><button class="btn" onclick="printRegister()">Als PDF</button>',
    searchFields: fields, matchChip: lvMatchFactory(fields),
    hint: (data) => `${data.length} Blöcke · ${r.holder_count} Aktionäre`,
    belowHtml: (c.total_shares && r.free_shares > 0) ? `<p class="hint" style="margin-top:14px">⚠ ${fmtInt(r.free_shares)} von ${fmtInt(c.total_shares)} Aktien sind noch nicht ausgegeben.</p>` : '',
  });
}

function toggleShType(v) {
  document.getElementById('person-fields').style.display = v === 'company' ? 'none' : 'contents';

}
function collectShareholder() {
  const type = document.getElementById('f-type').value;
  const g = id => { const el = document.getElementById(id); return el ? el.value.trim() : ''; };
  return {
    type,
    salutation: g('f-salutation'),
    shareholder_no: type === 'company' ? g('f-shareholder_no_c') : g('f-shareholder_no'),
    first_name: g('f-first_name'),
    last_name: g('f-last_name'),
    company_name: g('f-company_name'),
    birthdate: g('f-birthdate'),
    email: g('f-email'), phone: g('f-phone'), mobile: g('f-mobile'),
    street: g('f-street'), zip: g('f-zip'), city: g('f-city'), country: g('f-country'),

function openShareholderModal(id) {
  const s = id ? state.shareholders.find(x => x.id === id) : null;
  openModal(`
    <div class="modal-head"><h3>${s ? 'Aktionär bearbeiten' : 'Neuer Aktionär'}</h3><span class="x" onclick="closeModal()">&times;</span></div>

async function saveShareholder(id) {
  const data = collectShareholder();
  const name = data.type === 'company' ? data.company_name : (data.last_name || data.first_name);
  if (!name) return toast('Bitte Name bzw. Firma angeben.', true);
  try {
    if (id) await api('/shareholders/' + id, { method: 'PUT', body: data });
    else await api('/companies/' + state.currentId + '/shareholders', { method: 'POST', body: data });
    closeModal(); await refreshCompany(); renderTab();
    toast('Aktionär gespeichert.');
  } catch (e) { toast(e.message, true); }
}
async function deleteShareholder(id) {
  if (!confirm('Diesen Aktionär wirklich löschen?')) return;
  try {
    await api('/shareholders/' + id, { method: 'DELETE' });
    closeModal(); await refreshCompany(); renderTab();
    toast('Aktionär gelöscht.');
  } catch (e) { toast(e.message, true); }
}

function knownClasses() {

function issueAutoCalc() {
  const s = Number(document.getElementById('t-start').value);
  const e = Number(document.getElementById('t-end').value);
  if (s > 0 && e >= s) {
    document.getElementById('t-shares').value = e - s + 1;
    document.getElementById('t-shares').disabled = true;
  } else {
    document.getElementById('t-shares').disabled = false;
  }
}
function issueClearRange() {
  document.getElementById('t-start').value = '';
  document.getElementById('t-end').value = '';
  document.getElementById('t-shares').disabled = false;
}
async function submitIssue() {
  const cls = document.getElementById('t-class').value.trim();
  if (!cls) return toast('Bitte Aktiengattung angeben.', true);
  const startRaw = document.getElementById('t-start').value;
  const endRaw   = document.getElementById('t-end').value;
  const body = {
    type: 'issue',
    to_shareholder_id: Number(document.getElementById('t-to').value),
    share_class: cls,
    share_number_start: startRaw !== '' ? Number(startRaw) : null,
    share_number_end:   endRaw   !== '' ? Number(endRaw)   : null,
    shares: Number(document.getElementById('t-shares').value) || null,
    trade_date: document.getElementById('t-date').value,
    note: document.getElementById('t-note').value.trim(),
  };
  if (!body.share_number_start && (!body.shares || body.shares <= 0)) return toast('Bitte Anzahl oder Nummernbereich angeben.', true);
  try {
    await api('/companies/' + state.currentId + '/transactions', { method: 'POST', body });
    closeModal(); await refreshCompany(); renderTab();
    toast('Aktien ausgegeben.');
  } catch (e) { toast(e.message, true); }
}

function saleUpdateSellerBlocks(shId) {
  const sh = state.shareholders.find(s => s.id === Number(shId));
  if (!sh) return;
  const blocks = sh.holding_blocks || [];
  const wrap = document.getElementById('s-blocks');
  if (wrap) {
    wrap.innerHTML = blocks.map(b =>
      `<span class="badge" style="margin:2px">${esc(b.share_class)} ${b.share_number_start != null ? fmtInt(b.share_number_start) + '–' + fmtInt(b.share_number_end) : ''} (${fmtInt(b.shares)})</span>`
    ).join('') || '–';
  }
  // Gattungs-Dropdown befüllen
  const cls = [...new Set(blocks.map(b => b.share_class))];

function renderAnalytics() {
  const r = state.register;
  if (!r.holders.length) {
    document.getElementById('content').innerHTML = `<div class="empty"><div class="big">📊</div><p>Noch keine Beteiligungen vorhanden.</p></div>`;
    return;
  }
  const holders = r.holders;
  const donut = buildDonut(holders);
  const legend = holders.map((h, i) => `
    <div class="legend-row">
      <span class="legend-dot" style="background:${PALETTE[i % PALETTE.length]}"></span>
      <span class="lname">${esc(h.name)}</span>
      <span class="hint">${fmtInt(h.shares)}</span>
      <span class="lpct">${fmtPct(h.percent)}</span>
    </div>`).join('');

  // Per-class aggregation
  const classStats = {};
  for (const h of holders) {
    for (const [cls, clsData] of Object.entries(h.classes)) {
      if (!classStats[cls]) classStats[cls] = { shares: 0, holders: 0 };
      classStats[cls].shares += clsData.shares;
      classStats[cls].holders++;
    }
  }
  const totalShares = r.issued_shares || 1;
  const classRows = Object.entries(classStats)
    .sort(([, a], [, b]) => b.shares - a.shares)
    .map(([cls, data]) => `
      <tr>
        <td><span class="badge">${esc(cls)}</span></td>
        <td class="num">${fmtInt(data.shares)}</td>
        <td class="num">${data.holders}</td>
        <td class="num">${fmtPct(data.shares / totalShares * 100)}</td>
      </tr>`).join('');

  // Top 5 holders
  const top5Rows = holders.slice(0, 5).map(h => `
    <tr>
      <td>
        <strong>${esc(h.name)}</strong>
        <span class="badge ${h.type}" style="margin-left:4px">${h.type === 'company' ? 'Firma' : 'Person'}</span>
      </td>
      <td class="num">${fmtInt(h.shares)}</td>
      <td class="num">${fmtPct(h.percent)}</td>
    </tr>`).join('');

  const top = holders[0];
  const c = r.company;
  document.getElementById('content').innerHTML = `
    <div class="toolbar"><div class="section-title" style="margin:0">Auswertung der Beteiligungen</div></div>
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px; align-items:start">
      <div class="card">
        <div class="section-title">Verteilung</div>
        <div class="donut-wrap">
          <svg viewBox="0 0 200 200" width="200" height="200">${donut}
            <circle cx="100" cy="100" r="56" fill="var(--surface)"></circle>
            <text x="100" y="94" text-anchor="middle" fill="var(--text)" font-size="22" font-weight="700">${r.holder_count}</text>
            <text x="100" y="114" text-anchor="middle" fill="var(--muted)" font-size="10">Aktionäre</text>
          </svg>
          <div class="legend">${legend}</div>
        </div>
      </div>
      <div class="card">
        <div class="section-title">Kennzahlen</div>
        <table>
          <tbody>
            <tr><td>Größter Aktionär</td><td class="num"><strong>${esc(top.name)}</strong> · ${fmtPct(top.percent)}</td></tr>
            <tr><td>Ausgegebene Aktien</td><td class="num">${fmtInt(r.issued_shares)}</td></tr>
            <tr><td>Gesamtaktien (Soll)</td><td class="num">${fmtInt(r.total_shares || r.issued_shares)}</td></tr>
            ${c.total_shares ? `<tr><td>Freie Aktien</td><td class="num">${fmtInt(r.free_shares)} · ${fmtPct(r.free_shares / r.total_shares * 100)}</td></tr>` : ''}
            <tr><td>Mehrheit (&gt; 50 %)</td><td class="num">${top.percent > 50 ? '✅ ' + esc(top.name) : '— keine'}</td></tr>
            <tr><td>Sperrminorität (≥ 25 %)</td><td class="num">${holders.filter(h => h.percent >= 25).length} Aktionär(e)</td></tr>
            <tr><td>Aktiengattungen</td><td class="num">${Object.keys(classStats).length}</td></tr>
          </tbody>
        </table>
      </div>
    </div>
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px; margin-top:20px; align-items:start">
      <div class="card">
        <div class="section-title">Nach Aktiengattung</div>
        <table>
          <thead><tr>
            <th>Gattung</th>
            <th class="num">Aktien</th>
            <th class="num">Aktionäre</th>
            <th class="num">Anteil</th>
          </tr></thead>
          <tbody>${classRows}</tbody>
        </table>
      </div>
      <div class="card">
        <div class="section-title">Größte Aktionäre</div>
        <table>
          <thead><tr>
            <th>Aktionär</th>
            <th class="num">Aktien</th>
            <th class="num">Anteil</th>
          </tr></thead>
          <tbody>${top5Rows}</tbody>
        </table>
      </div>
    </div>`;
}
function buildDonut(holders) {
  const total = holders.reduce((a, h) => a + h.shares, 0) || 1;
  let acc = 0; const R = 80, C = 2 * Math.PI * R;
  return holders.map((h, i) => {
    const frac = h.shares / total;
    const dash = frac * C;
    const seg = `<circle cx="100" cy="100" r="${R}" fill="none"
      stroke="${PALETTE[i % PALETTE.length]}" stroke-width="32"
      stroke-dasharray="${dash} ${C - dash}" stroke-dashoffset="${-acc * C}"
      transform="rotate(-90 100 100)"></circle>`;
    acc += frac;
    return seg;
  }).join('');
}

function buildPrintHTML({ company, holders, issued, base, total, title, asOf, version }) {
  const hasNominal = company.nominal_value != null && company.nominal_value !== '';
  const addr = [company.street, [company.zip, company.city].filter(Boolean).join(' '), company.country].filter(Boolean).join(', ');
  const rows = holders.map((h, i) => `
    <tr>
      <td>${i + 1}</td>
      <td>${esc(h.name)}</td>
      <td>${esc(h.city || '')}</td>
      <td class="num">${fmtInt(h.shares)}</td>
      ${hasNominal ? `<td class="num">${fmtMoney(h.shares * company.nominal_value, company.currency)}</td>` : ''}
      <td class="num">${fmtPct(h.percent)}</td>
    </tr>`).join('');
  const place = company.seat || company.city || '';
  const dateStr = new Date().toLocaleDateString('de-DE');
  return `
    <div class="ph-head">
      <div>
        <div style="font-size:14pt; font-weight:bold">${esc(company.name)}</div>
        <div class="ph-meta">${esc(company.legal_form || '')}${addr ? ' · ' + esc(addr) : ''}</div>
        ${company.register_number ? `<div class="ph-meta">HR-Nr.: ${esc(company.register_number)}</div>` : ''}
      </div>
      <div class="ph-meta" style="text-align:right">
        ${version ? `Version ${esc(version)}<br>` : ''}
        Stichtag: ${esc(asOf || dateStr)}
      </div>
    </div>
    <h1>${esc(title)}</h1>
    <div class="ph-sub">${company.share_class ? esc(company.share_class) + ' · ' : ''}Gesamtzahl Aktien: ${fmtInt(total || base)}${hasNominal ? ' · Nennwert je Aktie: ' + fmtMoney(company.nominal_value, company.currency) : ''}</div>
    <table>
      <thead><tr>
        <th>Nr.</th><th>Aktionär</th><th>Ort</th><th class="num">Aktien</th>
        ${hasNominal ? '<th class="num">Nennbetrag</th>' : ''}<th class="num">Anteil</th>
      </tr></thead>
      <tbody>${rows || `<tr><td colspan="${hasNominal ? 6 : 5}">Keine Aktien zugeteilt</td></tr>`}</tbody>
      <tfoot><tr>
        <td></td><td>Summe</td><td></td><td class="num">${fmtInt(issued)}</td>
        ${hasNominal ? `<td class="num">${fmtMoney(issued * company.nominal_value, company.currency)}</td>` : ''}
        <td class="num">${fmtPct(base ? issued / base * 100 : 0)}</td>
      </tr></tfoot>
    </table>
    <div class="sig-block">
      <div class="sig"><div class="line">${esc(place)}, den ${esc(dateStr)}</div></div>
      <div class="sig"><div class="line">${company.board ? esc(company.board) + ' — ' : ''}Vorstand / Geschäftsführung</div></div>
    </div>
    <p style="margin-top:30px; font-size:8.5pt; color:#555">Dieses Aktienregister wurde mit Share Handling erstellt am ${dateStr}.</p>`;
}
function doPrint(html) {
  document.getElementById('print-area').innerHTML = html;
  window.print();
}
function printRegister() {
  const r = state.register;
  doPrint(buildPrintHTML({
    company: r.company, holders: r.holders, issued: r.issued_shares,
    base: r.base_shares, total: r.total_shares, title: 'Aktienregister',
  }));
}
async function printSnapshot(id) {
  try {
    const s = await api('/snapshots/' + id);
    const d = s.data;
    doPrint(buildPrintHTML({
      company: d.company, holders: d.holders, issued: d.issued_shares,
      base: d.base_shares, total: d.total_shares,
      title: 'Aktienregister', asOf: s.as_of_date, version: 'v' + s.version + (s.label ? ' — ' + s.label : ''),
    }));
  } catch (e) { toast(e.message, true); }
}
