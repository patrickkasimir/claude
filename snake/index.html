<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    h1 {
      font-size: 2.5rem;
      letter-spacing: 4px;
      margin-bottom: 16px;
      color: #4ade80;
      text-shadow: 0 0 20px #4ade8088;
    }

    #scoreboard {
      display: flex;
      gap: 40px;
      margin-bottom: 16px;
      font-size: 1rem;
      color: #aaa;
    }

    #scoreboard span { color: #4ade80; font-weight: bold; font-size: 1.2rem; }

    #canvas-wrapper {
      position: relative;
    }

    canvas {
      border: 2px solid #4ade8066;
      border-radius: 4px;
      box-shadow: 0 0 40px #4ade8033;
      display: block;
    }

    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2ecc;
      border-radius: 4px;
    }

    #overlay h2 { font-size: 2rem; color: #4ade80; margin-bottom: 8px; }
    #overlay p  { color: #aaa; margin-bottom: 24px; font-size: 0.95rem; }

    #overlay button, #restart-btn {
      background: #4ade80;
      color: #1a1a2e;
      border: none;
      padding: 12px 32px;
      font-size: 1rem;
      font-weight: bold;
      border-radius: 6px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.2s;
    }

    #overlay button:hover, #restart-btn:hover { background: #22c55e; }

    #controls {
      margin-top: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .ctrl-row { display: flex; gap: 6px; }

    .key {
      width: 44px; height: 44px;
      background: #16213e;
      border: 1px solid #4ade8044;
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem;
      color: #4ade80;
      user-select: none;
    }

    #difficulty {
      margin-bottom: 16px;
      display: flex;
      gap: 10px;
    }

    #difficulty button {
      background: #16213e;
      border: 1px solid #4ade8044;
      color: #aaa;
      padding: 6px 18px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.2s;
    }

    #difficulty button.active {
      background: #4ade80;
      color: #1a1a2e;
      font-weight: bold;
      border-color: #4ade80;
    }
  </style>
</head>
<body>

<script src="/claudeapps/shared/back-button.js"></script>

<h1>SNAKE</h1>

<div id="scoreboard">
  Punkte: <span id="score">0</span>
  &nbsp;&nbsp;Highscore: <span id="highscore">0</span>
</div>

<div id="difficulty">
  <button data-speed="200" class="active">Leicht</button>
  <button data-speed="120">Normal</button>
  <button data-speed="70">Schnell</button>
</div>

<div id="canvas-wrapper">
  <canvas id="game" width="400" height="400"></canvas>
  <div id="overlay">
    <h2>🐍 SNAKE</h2>
    <p>Steuere die Schlange mit den Pfeiltasten oder WASD</p>
    <button id="start-btn">SPIELEN</button>
  </div>
</div>

<div id="controls">
  <div class="ctrl-row"><div class="key">▲</div></div>
  <div class="ctrl-row">
    <div class="key">◀</div>
    <div class="key">▼</div>
    <div class="key">▶</div>
  </div>
</div>

<script>
  const canvas  = document.getElementById('game');
  const ctx     = canvas.getContext('2d');
  const overlay = document.getElementById('overlay');
  const scoreEl = document.getElementById('score');
  const hsEl    = document.getElementById('highscore');

  const COLS = 20, ROWS = 20;
  const CELL = canvas.width / COLS;

  let snake, dir, nextDir, food, score, gameLoop, speed, running;
  let highscore = 0;
  speed = 200;

  // Difficulty buttons
  document.querySelectorAll('#difficulty button').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#difficulty button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      speed = parseInt(btn.dataset.speed);
      if (running) { clearInterval(gameLoop); gameLoop = setInterval(tick, speed); }
    });
  });

  document.getElementById('start-btn').addEventListener('click', startGame);

  document.addEventListener('keydown', e => {
    const map = {
      ArrowUp: [0,-1], ArrowDown: [0,1], ArrowLeft: [-1,0], ArrowRight: [1,0],
      w: [0,-1], s: [0,1], a: [-1,0], d: [1,0],
      W: [0,-1], S: [0,1], A: [-1,0], D: [1,0],
    };
    if (map[e.key]) {
      e.preventDefault();
      const [nx, ny] = map[e.key];
      if (nx !== -dir[0] || ny !== -dir[1]) nextDir = [nx, ny];
    }
  });

  function startGame() {
    snake   = [{x:10, y:10}, {x:9, y:10}, {x:8, y:10}];
    dir     = [1, 0];
    nextDir = [1, 0];
    score   = 0;
    running = true;
    scoreEl.textContent = 0;
    overlay.style.display = 'none';
    placeFood();
    clearInterval(gameLoop);
    gameLoop = setInterval(tick, speed);
  }

  function placeFood() {
    let pos;
    do {
      pos = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
    } while (snake.some(s => s.x === pos.x && s.y === pos.y));
    food = pos;
  }

  function tick() {
    dir = nextDir;
    const head = { x: snake[0].x + dir[0], y: snake[0].y + dir[1] };

    // Wall collision
    if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) return endGame();
    // Self collision
    if (snake.some(s => s.x === head.x && s.y === head.y)) return endGame();

    snake.unshift(head);

    if (head.x === food.x && head.y === food.y) {
      score++;
      scoreEl.textContent = score;
      if (score > highscore) { highscore = score; hsEl.textContent = highscore; }
      placeFood();
    } else {
      snake.pop();
    }

    draw();
  }

  function draw() {
    // Background
    ctx.fillStyle = '#0f0f1a';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Grid (subtle)
    ctx.strokeStyle = '#ffffff08';
    ctx.lineWidth = 0.5;
    for (let x = 0; x <= COLS; x++) {
      ctx.beginPath(); ctx.moveTo(x*CELL,0); ctx.lineTo(x*CELL,canvas.height); ctx.stroke();
    }
    for (let y = 0; y <= ROWS; y++) {
      ctx.beginPath(); ctx.moveTo(0,y*CELL); ctx.lineTo(canvas.width,y*CELL); ctx.stroke();
    }

    // Food
    ctx.fillStyle = '#f87171';
    ctx.shadowColor = '#f87171';
    ctx.shadowBlur = 12;
    ctx.beginPath();
    ctx.arc(food.x*CELL + CELL/2, food.y*CELL + CELL/2, CELL/2 - 2, 0, Math.PI*2);
    ctx.fill();
    ctx.shadowBlur = 0;

    // Snake
    snake.forEach((seg, i) => {
      const t = 1 - i / snake.length;
      ctx.fillStyle = i === 0 ? '#22c55e' : `rgba(74, 222, 128, ${0.3 + t * 0.7})`;
      ctx.shadowColor = '#4ade80';
      ctx.shadowBlur = i === 0 ? 10 : 4;
      ctx.beginPath();
      ctx.roundRect(seg.x*CELL + 1, seg.y*CELL + 1, CELL - 2, CELL - 2, 3);
      ctx.fill();
    });
    ctx.shadowBlur = 0;

    // Eyes on head
    const hx = snake[0].x*CELL, hy = snake[0].y*CELL;
    ctx.fillStyle = '#1a1a2e';
    const [ex1, ey1, ex2, ey2] = eyePositions(dir, hx, hy);
    ctx.beginPath(); ctx.arc(ex1, ey1, 2, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(ex2, ey2, 2, 0, Math.PI*2); ctx.fill();
  }

  function eyePositions([dx,dy], hx, hy) {
    const c = CELL, h = c/2;
    if (dx===1)  return [hx+c-5, hy+4,    hx+c-5, hy+c-4];
    if (dx===-1) return [hx+5,   hy+4,    hx+5,   hy+c-4];
    if (dy===1)  return [hx+4,   hy+c-5,  hx+c-4, hy+c-5];
    return               [hx+4,   hy+5,    hx+c-4, hy+5];
  }

  function endGame() {
    clearInterval(gameLoop);
    running = false;
    overlay.innerHTML = `
      <h2>Game Over</h2>
      <p>Punkte: ${score} &nbsp;|&nbsp; Highscore: ${highscore}</p>
      <button id="restart-btn">NOCHMAL</button>
    `;
    overlay.style.display = 'flex';
    document.getElementById('restart-btn').addEventListener('click', startGame);
  }

  // Initial draw
  ctx.fillStyle = '#0f0f1a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
</script>
</body>
</html>
