<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Odoodelizer – Ersteinrichtung Schritt für Schritt</title>
  <style>
    :root {
      --bg: #f4f3f7;
      --surface: #ffffff;
      --surface2: #faf9fc;
      --text: #2b2733;
      --muted: #8b8794;
      --accent: #714B67;
      --accent2: #9b6a8c;
      --accent-soft: #f0e9ef;
      --border: #e7e3ec;
      --ok: #4a9d6e;
      --warn: #c98a2b;
      --shadow: 0 1px 3px #2b273310, 0 8px 24px #2b273308;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; line-height: 1.5; font-size: 15px; padding-bottom: 96px; }
    a { color: var(--accent); text-decoration: none; }
    .wrap { max-width: 1240px; margin: 0 auto; padding: 0 24px; }

    /* Header (Analyzer-Look) */
    header.top { background: linear-gradient(120deg, var(--accent), var(--accent2)); color: #fff; padding: 30px 0; }
    header.top h1 { font-size: 1.7rem; letter-spacing: 0.5px; font-weight: 600; display: flex; align-items: center; gap: 10px; }
    header.top .sub { margin-top: 8px; opacity: 0.93; font-size: 0.95rem; display: flex; flex-wrap: wrap; gap: 4px 18px; }
    header.top .sub b { font-weight: 600; }
    .badge-mock { display: inline-block; margin-top: 14px; background: #ffffff22; border: 1px solid #ffffff55; padding: 3px 12px; border-radius: 999px; font-size: 0.78rem; letter-spacing: 0.5px; }

    /* Top-Toolbar mit Filtern (volle Breite darunter) */
    .toolbar { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin: 22px 0 22px; }
    .seg { display: inline-flex; background: var(--surface); border: 1px solid var(--border); border-radius: 9px; overflow: hidden; box-shadow: var(--shadow); }
    .seg button { background: none; border: none; color: var(--muted); padding: 8px 15px; font-size: 0.88rem; font-family: inherit; cursor: pointer; border-right: 1px solid var(--border); }
    .seg button:last-child { border-right: none; }
    .seg button.active { background: var(--accent-soft); color: var(--accent); font-weight: 600; }
    .search { padding: 8px 13px; border: 1px solid var(--border); border-radius: 9px; font-size: 0.88rem; background: var(--surface); color: var(--text); font-family: inherit; min-width: 230px; box-shadow: var(--shadow); }
    .search:focus { outline: none; border-color: var(--accent); }
    .toolbar .hint { color: var(--muted); font-size: 0.83rem; margin-left: auto; }

    section { margin-bottom: 34px; }
    .sec-h { display: flex; align-items: baseline; gap: 10px; margin-bottom: 4px; }
    .sec-h h2 { font-size: 1.15rem; font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 9px; }
    .sec-h h2 .ic { color: var(--accent); }
    .sec-h .count { color: var(--muted); font-size: 0.85rem; }
    section .desc { color: var(--muted); font-size: 0.88rem; margin-bottom: 16px; }
    .cat-h { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--accent); font-weight: 700; margin: 22px 2px 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
    .cat-h .cnt { color: var(--muted); font-weight: 500; letter-spacing: 0; text-transform: none; font-size: 0.8rem; }

    /* Karten-Grid (volle Breite) */
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 14px; }
    .box { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 15px 17px 12px; box-shadow: var(--shadow); display: flex; flex-direction: column; transition: border-color .15s, box-shadow .15s; }
    .box.platform { border-top: 3px solid var(--accent); }
    .box:hover { box-shadow: 0 2px 6px #2b273318, 0 10px 30px #2b273310; }
    .box.sel { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent) inset, var(--shadow); background: linear-gradient(180deg, var(--accent-soft), var(--surface) 60%); }
    .box-top { display: flex; align-items: flex-start; gap: 11px; margin-bottom: 8px; }
    .box-icon { font-size: 1.4rem; line-height: 1.2; }
    .box-title { font-size: 1rem; font-weight: 600; flex: 1; }
    .box-sub { color: var(--muted); font-size: 0.74rem; margin-top: 2px; }
    .tag { font-size: 0.62rem; letter-spacing: 1px; text-transform: uppercase; padding: 2px 9px; border-radius: 999px; background: var(--accent-soft); color: var(--accent); white-space: nowrap; }
    .selbox { display: flex; align-items: center; gap: 6px; cursor: pointer; user-select: none; font-size: 0.74rem; color: var(--muted); white-space: nowrap; }
    .selbox input { width: 15px; height: 15px; accent-color: var(--accent); cursor: pointer; }

    /* Aufgaben-Liste */
    ul.tasks { list-style: none; display: flex; flex-direction: column; gap: 1px; margin-top: 6px; border-top: 1px solid var(--border); padding-top: 6px; }
    li.task .th { display: flex; align-items: center; gap: 8px; padding: 7px 6px; border-radius: 7px; cursor: pointer; }
    li.task .th:hover { background: var(--surface2); }
    li.task .tt { flex: 1; font-size: 0.87rem; }
    li.task .badge { font-size: 0.66rem; padding: 2px 7px; border-radius: 999px; white-space: nowrap; }
    li.task .dur { background: var(--accent-soft); color: var(--accent); }
    li.task .dep { background: color-mix(in srgb, var(--warn) 16%, #fff); color: var(--warn); border: 1px solid color-mix(in srgb, var(--warn) 30%, transparent); cursor: help; }
    li.task .desc { display: none; padding: 0 6px 9px 24px; color: var(--muted); font-size: 0.82rem; line-height: 1.5; }
    li.task.open .desc { display: block; }
    li.task .caret { color: var(--muted); font-size: 0.66rem; transition: transform .12s; }
    li.task.open .caret { transform: rotate(90deg); }
    .empty { color: var(--muted); font-size: 0.85rem; font-style: italic; padding: 10px 6px; }
    .loading { padding: 50px; text-align: center; color: var(--muted); }

    /* Sticky Auswahl-Leiste */
    .selbar { position: fixed; left: 0; right: 0; bottom: 0; background: color-mix(in srgb, var(--surface) 94%, transparent); backdrop-filter: blur(8px); border-top: 1px solid var(--border); box-shadow: 0 -4px 20px #2b273312; padding: 12px 16px; display: flex; align-items: center; gap: 16px; justify-content: center; flex-wrap: wrap; z-index: 20; }
    .selbar .info { font-size: 0.9rem; color: var(--text); }
    .selbar .info b { color: var(--accent); }
    .btn { background: linear-gradient(120deg, var(--accent), var(--accent2)); color: #fff; border: none; border-radius: 9px; padding: 10px 20px; font-weight: 600; font-size: 0.92rem; letter-spacing: .2px; cursor: pointer; font-family: inherit; }
    .btn:disabled { opacity: .5; cursor: default; }
    .btn.ghost { background: none; color: var(--accent); border: 1px solid var(--border); }
    .btn.ghost:hover { background: var(--accent-soft); }

    .toast { position: fixed; bottom: 84px; left: 50%; transform: translateX(-50%) translateY(16px); opacity: 0; transition: .25s; background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 11px 18px; border-radius: 10px; font-size: 0.88rem; z-index: 30; pointer-events: none; box-shadow: var(--shadow); }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .hidden { display: none !important; }

    @media (max-width: 620px) {
      .toolbar .hint { display: none; }
      .search { min-width: 0; flex: 1; }
    }
  </style>
</head>
<body>
  <script src="/claudeapps/shared/back-button.js"></script>

  <header class="top">
    <div class="wrap">
      <h1><span>🧭</span> Odoodelizer</h1>
      <div class="sub"><b>Ersteinrichtung neuer Firmen</b> <span>plattformweit &amp; App für App</span> <span>Abhängigkeiten · Status · Zeitplan</span></div>
      <span class="badge-mock">Öffentliche Übersicht</span>
    </div>
  </header>

  <div class="wrap">
    <div class="toolbar">
      <div class="seg" id="seg">
        <button data-f="all" class="active">Alles</button>
        <button data-f="platform">Plattform-Themen</button>
        <button data-f="app">Apps</button>
      </div>
      <input class="search" id="search" placeholder="Aufgabe / App suchen …" />
      <span class="hint">Apps für deinen Durchlauf anhaken – Plattform-Themen sind immer dabei.</span>
    </div>

    <div id="content"><div class="loading">Lade das Set …</div></div>
  </div>

  <div class="selbar hidden" id="selbar">
    <div class="info"><b id="selCount">0</b> Apps gewählt · <b id="taskCount">0</b> Aufgaben im Durchlauf</div>
    <button class="btn ghost" id="btnAll">Alle Apps</button>
    <button class="btn" id="btnStart" disabled>Registrieren &amp; loslegen →</button>
  </div>
  <div class="toast" id="toast"></div>

  <script>
    const API = new URL('api/', location.href).href;        // → /claudeapps/odoodelizer/api/
    const LS_KEY = 'odoodelizer_selected_apps';
    let CATALOG = { boxes: [] };
    let titleByKey = {};
    let selected = new Set(JSON.parse(localStorage.getItem(LS_KEY) || '[]'));
    let filter = 'all', query = '';

    const $ = s => document.querySelector(s);
    const esc = s => (s||'').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

    function toast(msg){ const t=$('#toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2600); }

    async function load(){
      try {
        const r = await fetch(API + 'catalog');
        if(!r.ok) throw new Error('HTTP '+r.status);
        CATALOG = await r.json();
      } catch(e){
        $('#content').innerHTML = '<div class="loading">Das Set konnte nicht geladen werden.<br><small>'+esc(e.message)+'</small></div>';
        return;
      }
      CATALOG.boxes.forEach(b => b.tasks.forEach(t => titleByKey[t.key] = t.title));
      render();
    }

    function boxMatchesQuery(b){
      if(!query) return true;
      const q = query.toLowerCase();
      if(b.name.toLowerCase().includes(q)) return true;
      return b.tasks.some(t => t.title.toLowerCase().includes(q) || (t.description||'').toLowerCase().includes(q));
    }

    function taskLi(t){
      const deps = (t.deps||[]).map(k => titleByKey[k] || k);
      const depBadge = deps.length ? '<span class="badge dep" title="Hängt ab von: '+esc(deps.join(' · '))+'">🔒 '+deps.length+'</span>' : '';
      return '<li class="task">'
        + '<div class="th"><span class="caret">▶</span><span class="tt">'+esc(t.title)+'</span>'
        + '<span class="badge dur">'+ (t.duration_days||1) +' Tg</span>'+ depBadge +'</div>'
        + (t.description ? '<div class="desc">'+esc(t.description)+'</div>' : '')
        + '</li>';
    }

    function boxCard(b){
      const isApp = b.kind === 'app';
      const sel = isApp && selected.has(b.key);
      const right = isApp
        ? '<label class="selbox" title="Diese App in meinen Durchlauf aufnehmen"><input type="checkbox" data-key="'+b.key+'" '+(sel?'checked':'')+'/> in Durchlauf</label>'
        : '<span class="tag">Plattform</span>';
      const tasks = b.tasks.length
        ? '<ul class="tasks">'+ b.tasks.map(taskLi).join('') +'</ul>'
        : '<div class="empty">Aufgaben folgen in Kürze.</div>';
      return '<div class="box '+(isApp?'app':'platform')+(sel?' sel':'')+'" data-box="'+b.key+'">'
        + '<div class="box-top"><div class="box-icon">'+(b.icon||'📦')+'</div>'
        + '<div style="flex:1"><div class="box-title">'+esc(b.name)+'</div>'
        + '<div class="box-sub">'+ b.tasks.length +' Aufgabe'+(b.tasks.length===1?'':'n')+'</div></div>'
        + right +'</div>'
        + tasks + '</div>';
    }

    function render(){
      const boxes = CATALOG.boxes.filter(boxMatchesQuery);
      const plat = boxes.filter(b => b.kind==='platform');
      const apps = boxes.filter(b => b.kind==='app');
      let html = '';
      if(filter!=='app' && plat.length){
        html += '<section><div class="sec-h"><h2><span class="ic">🧭</span> Plattform-Themen</h2><span class="count">'+plat.length+' Bereiche</span></div>'
             +  '<div class="desc">Firmenübergreifende Grundlagen – immer Teil eines Durchlaufs.</div>'
             +  '<div class="grid">'+ plat.map(boxCard).join('') +'</div></section>';
      }
      if(filter!=='platform' && apps.length){
        html += '<section><div class="sec-h"><h2><span class="ic">🧩</span> Apps</h2><span class="count">'+apps.length+' Apps</span></div>'
             +  '<div class="desc">Nach Bereich gruppiert (wie im Odoo-App-Store) – hake die Apps an, die du nutzt.</div>';
        const cats = [];
        apps.forEach(b => { const c = b.category || 'Sonstige'; if(!cats.includes(c)) cats.push(c); });
        cats.forEach(c => {
          const inCat = apps.filter(b => (b.category||'Sonstige') === c);
          html += '<div class="cat-h">'+esc(c)+'<span class="cnt">'+inCat.length+' Apps</span></div>'
               +  '<div class="grid">'+ inCat.map(boxCard).join('') +'</div>';
        });
        html += '</section>';
      }
      if(!html) html = '<div class="loading">Nichts gefunden.</div>';
      $('#content').innerHTML = html;
      updateBar();
    }

    function updateBar(){
      const appKeys = new Set(CATALOG.boxes.filter(b=>b.kind==='app').map(b=>b.key));
      selected = new Set([...selected].filter(k => appKeys.has(k)));
      const platTasks = CATALOG.boxes.filter(b=>b.kind==='platform').reduce((n,b)=>n+b.tasks.length,0);
      const appTasks  = CATALOG.boxes.filter(b=>b.kind==='app' && selected.has(b.key)).reduce((n,b)=>n+b.tasks.length,0);
      $('#selCount').textContent = selected.size;
      $('#taskCount').textContent = platTasks + appTasks;
      $('#btnStart').disabled = false;
      $('#selbar').classList.remove('hidden');
      localStorage.setItem(LS_KEY, JSON.stringify([...selected]));
    }

    // Events
    document.addEventListener('click', e => {
      const th = e.target.closest('li.task .th');
      if(th){ th.parentElement.classList.toggle('open'); return; }
    });
    document.addEventListener('change', e => {
      const cb = e.target.closest('input[type=checkbox][data-key]');
      if(cb){
        if(cb.checked) selected.add(cb.dataset.key); else selected.delete(cb.dataset.key);
        cb.closest('.box').classList.toggle('sel', cb.checked);
        updateBar();
      }
    });
    $('#seg').addEventListener('click', e => {
      const b = e.target.closest('button[data-f]'); if(!b) return;
      filter = b.dataset.f;
      [...$('#seg').children].forEach(x => x.classList.toggle('active', x===b));
      render();
    });
    $('#search').addEventListener('input', e => { query = e.target.value.trim(); render(); });
    $('#btnAll').addEventListener('click', () => {
      const appKeys = CATALOG.boxes.filter(b=>b.kind==='app').map(b=>b.key);
      const allOn = appKeys.every(k => selected.has(k));
      selected = new Set(allOn ? [] : appKeys);
      render();
    });
    $('#btnStart').addEventListener('click', () => {
      localStorage.setItem(LS_KEY, JSON.stringify([...selected]));
      location.href = 'app/';   // Portal übernimmt die Auswahl aus localStorage
    });

    load();
  </script>
</body>
</html>
